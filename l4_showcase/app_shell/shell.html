<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>智储优控 · AS/RS 演示工作站</title>
<style>
:root{
  --red:#ff000f;--navy:#17365d;--ink:#16191d;--muted:#5c6670;--faint:#8a939c;
  --line:#d6dde2;--bg:#eef1f4;--paper:#ffffff;--soft:#f4f6f8;
  --mono:Consolas,"JetBrains Mono",monospace;
  --sans:"Microsoft YaHei","PingFang SC","Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--ink);font-family:var(--sans)}
body{display:flex;flex-direction:row}
button{font:inherit;cursor:pointer}

/* ---- 48px 常驻图标侧栏:不覆盖内容,内容区让位 48px(flex 布局天然保证) ---- */
.rail{flex:0 0 48px;width:48px;height:100%;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 0 16px;
  box-shadow:2px 0 14px rgba(0,0,0,.35);z-index:5}
.rail-sep{width:22px;height:1px;background:rgba(255,255,255,.18);flex:none}
.rail-item{position:relative;flex:none}
.rail-icon{width:40px;height:40px;border:0;border-radius:5px;background:transparent;color:#c3cad2;
  font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;opacity:.72;
  font-family:var(--sans);transition:background .12s,opacity .12s}
.rail-icon:hover{background:#ffffff1f;color:#fff;opacity:1}
.rail-icon.is-active{background:var(--navy);color:#fff;opacity:1}
.rail-icon:focus-visible{outline:2px solid #6fa3e0;outline-offset:1px}

/* ---- 悬停展开态:图标右侧浮出文字标签,常态收起仅显图标 ---- */
.flyout{position:absolute;left:100%;top:0;margin-left:9px;display:none;align-items:center;height:40px;
  background:#16191df2;color:#fff;padding:0 14px 0 12px;border-radius:4px;white-space:nowrap;
  font:700 12px var(--sans);box-shadow:0 6px 18px rgba(0,0,0,.35);z-index:6;pointer-events:none}
.flyout:before{content:"";position:absolute;left:-5px;top:50%;transform:translateY(-50%);
  border:5px solid transparent;border-right-color:#16191df2}
.flyout .k{font:700 11px var(--mono);color:#8fb3e8;margin-right:8px}
.rail-item:hover .flyout{display:flex}

/* ---- 内容区:iframe 装启动页/三场景页,http 同源 ---- */
#contentFrame{flex:1 1 auto;height:100%;width:100%;border:0;display:block;background:#eef1f4}

/* ---- 关于对话框 ---- */
/* 原生 <dialog> 默认靠 UA 样式表 margin:auto 居中;顶部 *{margin:0} 重置会把它吃掉,
   这里显式声明 fixed+inset+margin:auto 自己居中,不依赖 UA 样式表优先级。 */
#aboutDialog{border:0;border-radius:8px;padding:0;width:420px;max-width:90vw;
  position:fixed;inset:0;margin:auto;height:fit-content;
  box-shadow:0 20px 60px rgba(0,0,0,.4);font-family:var(--sans);color:var(--ink)}
#aboutDialog::backdrop{background:rgba(10,14,18,.55)}
.about-top{height:4px;background:var(--red)}
.about-body{padding:26px 28px 22px}
.about-brand{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.about-brand .mark{font:900 22px/1 Arial,sans-serif;color:var(--red)}
.about-brand .title{font:700 17px/1.3 var(--sans);color:var(--ink)}
.about-sub{font:11.5px/1.5 var(--sans);color:var(--muted);margin-bottom:16px}
.about-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:12px}
.about-row .lbl{color:var(--faint);min-width:76px;flex:none}
.about-row .val{color:var(--ink);font-weight:600}
.about-badge{display:inline-flex;align-items:center;gap:5px;background:var(--navy);color:#fff;
  font:700 10px var(--sans);padding:4px 10px;border-radius:12px}
.about-fingerprint{font:10.5px var(--mono);color:var(--muted)}
.about-versions{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);
  font:10.5px/1.7 var(--mono);color:var(--muted)}
.about-versions b{color:var(--muted);font-weight:700}
.about-close{margin-top:20px;width:100%;padding:9px;background:var(--navy);color:#fff;border:1px solid var(--navy);
  border-radius:4px;font:700 12px var(--sans);letter-spacing:.3px}
.about-close:hover{background:#0f2740}

/* ---- toast(材料打不开提示,非静默) ---- */
#toast{position:fixed;left:50%;bottom:34px;transform:translate(-50%,12px);
  background:var(--ink);color:#fff;font:700 12.5px var(--sans);padding:11px 20px;border-radius:5px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:100}
#toast.is-visible{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<nav class="rail" id="rail">
  <div class="rail-item" data-key="launch"><button class="rail-icon" aria-label="启动页">⌂</button><div class="flyout"><span class="k">00</span>启动页</div></div>
  <div class="rail-sep"></div>
  <div class="rail-item" data-key="01"><button class="rail-icon" aria-label="01 连续填仓">①</button><div class="flyout"><span class="k">01</span>连续填仓</div></div>
  <div class="rail-item" data-key="02"><button class="rail-icon" aria-label="02 入出闭环">②</button><div class="flyout"><span class="k">02</span>入出闭环</div></div>
  <div class="rail-item" data-key="03"><button class="rail-icon" aria-label="03 FIO物理证据">③</button><div class="flyout"><span class="k">03</span>FIO物理证据</div></div>
  <div class="rail-sep"></div>
  <div class="rail-item" data-key="materials"><button class="rail-icon" aria-label="材料">📄</button><div class="flyout"><span class="k">DOC</span>提交材料</div></div>
  <div class="rail-item" data-key="about"><button class="rail-icon" aria-label="关于">ⓘ</button><div class="flyout"><span class="k">i</span>关于</div></div>
</nav>

<iframe id="contentFrame" title="内容区" src="launch.html"></iframe>

<dialog id="aboutDialog">
  <div class="about-top"></div>
  <div class="about-body">
    <div class="about-brand"><span class="mark">ABB</span><span class="title">智储优控 · AS/RS 演示工作站</span></div>
    <div class="about-sub">2026 ABB 杯 · 智能仓储赛题</div>
    <div class="about-row"><span class="lbl">版本</span><span class="val">v1.0</span></div>
    <div class="about-row"><span class="lbl">校验状态</span><span class="about-badge">✓ 已校验 · SIM 轨迹</span></div>
    <div class="about-row"><span class="lbl">复现指纹</span><span class="about-fingerprint">seed 2026 · sim_only</span></div>
    <div class="about-versions">
      <div><b>Electron</b> <span id="verElectron">-</span></div>
      <div><b>Chrome</b> <span id="verChrome">-</span></div>
      <div><b>Node</b> <span id="verNode">-</span></div>
    </div>
    <button class="about-close" id="aboutClose">关闭</button>
  </div>
</dialog>

<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

var KEY_TO_SRC = {
  launch: 'launch.html',
  materials: 'launch.html#materials',
  '01': '../src/01_连续填仓.html',
  '02': '../src/02_入出闭环.html',
  '03': '../src/03_FIO物理证据.html'
};

var frame = document.getElementById('contentFrame');
var railItems = Array.prototype.slice.call(document.querySelectorAll('.rail-item[data-key]'));
var aboutDialog = document.getElementById('aboutDialog');
var toastEl = document.getElementById('toast');
var toastTimer = null;
var currentKey = null;

function updateActiveState(key) {
  railItems.forEach(function (item) {
    var icon = item.querySelector('.rail-icon');
    var active = item.getAttribute('data-key') === key && key !== 'about';
    icon.classList.toggle('is-active', active);
  });
}

function navigateTo(key) {
  if (!KEY_TO_SRC[key]) return;
  if (key !== currentKey) {
    frame.src = KEY_TO_SRC[key];
  }
  currentKey = key;
  updateActiveState(key);
}

function showToast(text) {
  toastEl.textContent = text;
  toastEl.classList.add('is-visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { toastEl.classList.remove('is-visible'); }, 3200);
}

function openAbout() {
  try {
    var v = window.shellAPI.getVersions();
    document.getElementById('verElectron').textContent = v.electron || '-';
    document.getElementById('verChrome').textContent = v.chrome || '-';
    document.getElementById('verNode').textContent = v.node || '-';
  } catch (err) {
    /* shellAPI 未就绪时不阻塞对话框展示 */
  }
  if (typeof aboutDialog.showModal === 'function') {
    aboutDialog.showModal();
  } else {
    aboutDialog.setAttribute('open', '');
  }
}

async function handleOpenMaterial(key) {
  try {
    var result = await window.shellAPI.openMaterial(key);
    if (!result || !result.ok) showToast('材料路径将在打包版配置');
  } catch (err) {
    showToast('材料路径将在打包版配置');
  }
}

railItems.forEach(function (item) {
  var key = item.getAttribute('data-key');
  item.querySelector('.rail-icon').addEventListener('click', function () {
    if (key === 'about') { openAbout(); return; }
    navigateTo(key);
  });
});

document.getElementById('aboutClose').addEventListener('click', function () { aboutDialog.close(); });
aboutDialog.addEventListener('click', function (e) { if (e.target === aboutDialog) aboutDialog.close(); });

/* 内容 iframe(launch.html / 场景页)与壳之间唯一通道:同源 postMessage,校验 source 标记与 origin。 */
window.addEventListener('message', function (ev) {
  if (ev.origin !== window.location.origin) return;
  var data = ev.data;
  if (!data || data.source !== 'zhichu-shell') return;
  if (data.type === 'navigate' && KEY_TO_SRC[data.target]) {
    navigateTo(data.target);
  } else if (data.type === 'openMaterial' && data.key) {
    handleOpenMaterial(data.key);
  }
});

navigateTo('launch');

/* 供 verify 脚本探测壳已完成初始化(与站内 __S3_QA 同类约定)。 */
window.__SHELL_READY__ = true;
</script>
</body>
</html>
