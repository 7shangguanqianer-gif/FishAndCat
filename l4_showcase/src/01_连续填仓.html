<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智储优控 · 连续入库 · S3</title>
<style>
  :root{--brand:#ff000f;--ink:#1a1a1a;--muted:#69717a;--line:#d5d8dc;--paper:#fff;
    --bg:#f2f2f2;--navy:#17365d;--mid:#4a6fa5;--light:#9dbbdd;--amber:#e7b800;--alarm:#b71c1c}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;min-width:760px;min-height:660px;background:var(--bg);color:var(--ink);
    font-family:"Microsoft YaHei","Segoe UI",system-ui,sans-serif;overflow:hidden}
  #brand{height:54px;background:#1a1a1a;color:#fff;display:flex;align-items:center;gap:14px;padding:0 18px;
    border-bottom:4px solid var(--brand)}
  #brand .logo{font:900 24px/1 Arial,sans-serif;color:var(--brand);letter-spacing:.5px}
  #brand .title{font-size:16px;font-weight:700;letter-spacing:.3px}
  #brand .meta{margin-left:auto;font:11px/1.5 Consolas,"JetBrains Mono",monospace;color:#b7bcc4;text-align:right}
  #brand .meta b{color:#fff}
  #kpis{height:72px;padding:8px 12px;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;background:#e5e7ea}
  .kpi{min-width:0;background:var(--paper);border:1px solid #cfd3d7;border-radius:4px;padding:6px 11px;box-shadow:0 1px 2px #0000000b}
  .kpi .v{font:700 18px/1.15 Consolas,"JetBrains Mono",monospace;white-space:nowrap}
  .kpi .k{font-size:10.5px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #modebar{height:44px;display:flex;align-items:center;gap:4px;padding:5px 12px;background:#fff;border-top:1px solid #d7dade;border-bottom:1px solid #cfd3d7}
  .viewTab{height:32px;padding:0 15px;border:1px solid transparent;border-radius:3px;background:transparent;color:#616a73;cursor:pointer;font-weight:650}
  .viewTab:hover{background:#f1f3f5;color:#1a1a1a}.viewTab.active{background:#17202b;color:#fff;border-color:#17202b}
  #modeHint{margin-left:10px;color:#747c85;font-size:10.5px}.modeFact{margin-left:auto;font:10px/1 Consolas,"Microsoft YaHei",monospace;color:#68717b}
  #main{height:calc(100vh - 54px - 72px - 44px - 48px - 26px);padding:8px 12px;min-height:0}
  .view{display:none;width:100%;height:100%;min-height:0}.view.active{display:block}
  #dataView.active{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(2,minmax(0,1fr));gap:8px}
  .panel{min-height:0;background:#fff;border:1px solid #d1d5d9;border-radius:4px;padding:10px 12px 7px;display:flex;flex-direction:column;box-shadow:0 1px 2px #00000008}
  .panel .cap{text-align:left;font-size:12px;font-weight:700;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .panel .question{font-size:10px;color:#747c85;margin:3px 0 2px}
  .panel canvas{width:100%;height:100%;min-height:0;display:block}
  .panel .note{text-align:right;font:9.5px/1.1 Consolas,"JetBrains Mono",monospace;color:#8d949c}
  #dataGuide{background:#17202b;color:#f2f5f8;border-color:#17202b;padding:16px 18px;justify-content:space-between}
  #dataGuide h2{font-size:15px;margin-bottom:7px}#dataGuide p{font-size:11px;line-height:1.7;color:#bfc7d0}
  #dataGuide .rule{display:grid;grid-template-columns:auto 1fr;gap:7px 10px;margin-top:10px;font-size:10.5px;line-height:1.45}
  #dataGuide .rule b{color:#f0c800}#dataGuide .source{color:#8994a0;font:9.5px/1.5 Consolas,"Microsoft YaHei",monospace}
  #viewport{position:relative;width:100%;height:100%;min-height:0;background:#f2f2f2;border:1px solid #d1d5d9;border-radius:4px;overflow:hidden}
  #gl{position:absolute;inset:0}
  #workHud{position:absolute;z-index:4;top:9px;left:10px;right:10px;display:grid;grid-template-columns:minmax(360px,480px) 292px;justify-content:space-between;gap:8px;pointer-events:none}
  #taskline{min-width:0;padding:7px 10px;border-left:3px solid var(--amber);background:#fffffff0;box-shadow:0 1px 5px #00000018;line-height:1.35}
  #taskline .kicker{font:8.5px/1.2 Consolas,"Microsoft YaHei",monospace;color:#7a828a;letter-spacing:.6px}
  #taskline .primary{display:flex;align-items:center;gap:8px;min-width:0;margin-top:2px;font-size:12px}
  #taskPrimary{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}#actionBadge{margin-left:auto;padding:3px 7px;background:#e7b800;color:#17202b;border-radius:2px;font-size:10px;font-weight:700;white-space:nowrap;transition:background-color .18s,color .18s}
  #taskline .metaRow{display:flex;gap:12px;margin-top:3px;color:#69717a;font:9.5px/1.2 Consolas,"Microsoft YaHei",monospace}
  #stepPurpose{display:flex;align-items:flex-start;gap:8px;margin-top:7px;padding:6px 7px;background:#edf2f6;color:#344653;font:10px/1.35 "Microsoft YaHei",sans-serif}
  #stepPurpose b{flex:0 0 auto;color:#17365d;font:800 9px/1.45 Consolas,monospace;letter-spacing:.35px}
  #axisHud{width:auto;padding:7px 9px;background:#17202be8;color:#eef3f8;
    border:1px solid #ffffff30;border-radius:3px;box-shadow:0 3px 12px #0002;font:10px/1.55 Consolas,"JetBrains Mono",monospace}
  #axisHud b{display:block;color:#fff;font-size:11px;margin-bottom:2px}#axisHud .axis{display:grid;grid-template-columns:22px 1fr auto;gap:5px;align-items:center}
  #axisHud .axis i{height:3px;background:#65707c;overflow:hidden}#axisHud .axis i:after{content:"";display:block;width:var(--fill,0%);height:100%;background:var(--c,#4a6fa5)}
  #phaseRail{position:absolute;z-index:4;left:10px;bottom:9px;width:min(51%,460px);padding:6px 8px 7px;background:#fffffff0;
    border:1px solid #d8dadd;border-radius:3px;box-shadow:0 2px 8px #00000012}
  #phaseRail .phaseTitle{display:flex;justify-content:space-between;margin-bottom:4px;color:#626a73;font:9px/1.2 Consolas,"Microsoft YaHei",monospace}
  #phaseSegments{position:relative;display:grid;height:19px;gap:2px}.phaseSeg{display:flex;align-items:center;justify-content:center;background:#e3e6e9;
    color:#69717a;font-size:8.5px;white-space:nowrap;overflow:hidden}.phaseSeg.active{font-weight:700}
  .phaseSeg:nth-child(1).active,.phaseSeg:nth-child(3).active{background:#e7b800;color:#17202b}
  .phaseSeg:nth-child(2).active{background:#17365d;color:#fff}.phaseSeg:nth-child(4).active{background:#8fb3e8;color:#17202b}
  #phaseCursor{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--amber);box-shadow:0 0 0 1px #fff;pointer-events:none}
  #legend{position:absolute;z-index:4;right:10px;bottom:9px;display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end;
    width:min(37%,355px);padding:6px 8px;background:#ffffffe8;border:1px solid #d8dadd;border-radius:3px;font-size:9.5px;color:#555}
  .sw{display:inline-flex;align-items:center;gap:4px}.sw i{display:inline-block;width:18px;height:3px;border-radius:2px}
  .sw i.multi{height:7px;background:linear-gradient(90deg,#17365d 0 33%,#4a6fa5 33% 66%,#9dbbdd 66%)}
  #bar{height:48px;display:flex;align-items:center;gap:12px;padding:0 14px;background:#fff;border-top:1px solid #d2d5d8}
  #bar .desc{flex:1;font-size:11px;line-height:1.45;color:#5d656d}
  #bar .desc b{color:#1a1a1a}
  button{font:12px/1 "Microsoft YaHei",sans-serif}
  button:focus-visible{outline:3px solid var(--amber);outline-offset:2px}
  .toolBtn{padding:8px 13px;background:#fff;border:1px solid var(--navy);border-radius:3px;color:var(--navy);cursor:pointer;white-space:nowrap}.toolBtn:hover{background:#eef3f9}
  #immersiveExit{display:none;position:absolute;z-index:9;top:99px;right:10px;padding:8px 12px;background:#17202be8;color:#fff;border:1px solid #ffffff55;border-radius:3px;cursor:pointer}
  body.immersive #brand,body.immersive #kpis,body.immersive #modebar,body.immersive #bar,body.immersive #foot{display:none}
  body.immersive #main{height:100vh;padding:0}body.immersive #viewport{border:0;border-radius:0}body.immersive #immersiveExit{display:block}
  body.data-mode #bar{display:none}body.data-mode #main{height:calc(100vh - 54px - 72px - 44px - 26px)}
  #foot{height:26px;background:#e5e7ea;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:0 14px;
    color:#747b83;font:9.5px/1 Consolas,"Microsoft YaHei",monospace;white-space:nowrap}
  @media(max-width:1100px){#brand .meta span{display:none}.kpi{padding-left:7px;padding-right:7px}.kpi .v{font-size:15px}.modeFact{display:none}}
  @media(max-width:920px){#workHud{grid-template-columns:minmax(340px,1fr) 235px}#axisHud{font-size:9px}#phaseRail{width:55%}#legend{width:40%;font-size:8.5px}.panel{padding:7px 9px 5px}.panel .question{display:none}}
  @media(max-width:800px){.kpi .v{font-size:13px}}

  /* 0714-R3 A 重做：左侧同源数据与 20×20 规则地图，右侧完整 3D 与阶段性动作特写。 */
  html,body{min-width:1280px;min-height:720px;background:#e7ebef}
  #brand,#kpis,#modebar,#bar,#foot{display:none!important}
  #main{height:100vh!important;padding:0!important}
  #sceneView,#viewport{height:100%;border:0;border-radius:0}
  #dataView{display:none!important}
  #gl{left:var(--rail-w,32%);background:var(--scene-bg,#edf1f3)}
  #workHud{position:absolute;z-index:5;inset:0 auto 0 0;width:var(--rail-w,32%);padding:24px 22px 18px;
    display:flex;flex-direction:column;justify-content:flex-start;gap:13px;pointer-events:auto;background:var(--rail-bg,#f7f8fa);
    color:var(--rail-ink,#15202b);border-right:1px solid var(--rail-line,#c6ced5);box-shadow:12px 0 30px #17202b12}
  #railHead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding-bottom:12px;border-bottom:1px solid var(--rail-line,#c6ced5)}
  #railHead .eyebrow{font:700 10px/1.2 Consolas,monospace;letter-spacing:1.5px;color:var(--accent,#17365d)}
  #railHead h1{margin-top:5px;font-size:22px;line-height:1.12;letter-spacing:-.4px}
  #railHead .matrix{font:700 11px/1.35 Consolas,monospace;text-align:right;color:var(--rail-muted,#65717c)}
  #taskline{padding:12px 13px;border:1px solid var(--rail-line,#c6ced5);border-left:4px solid var(--accent,#17365d);
    background:var(--card,#fff);box-shadow:none;line-height:1.3}
  #taskline .kicker{color:var(--rail-muted,#65717c)}#taskline .primary{display:block;margin-top:5px;font-size:14px}
  #taskPrimary{display:block;white-space:normal;line-height:1.35}#actionBadge{display:inline-flex;margin:10px 0 0;padding:6px 9px;font-size:11px}
  #taskline .metaRow{margin-top:8px;justify-content:space-between;color:var(--rail-muted,#65717c)}
  #axisHud{order:3;width:100%;padding:12px 13px;background:var(--axis-bg,#17202b);border:0;border-radius:0;box-shadow:none;font-size:11px}
  #axisHud b{font-size:10px;letter-spacing:1.2px;color:#c7d2dc;margin-bottom:8px}
  #axisHud .axis{grid-template-columns:20px 1fr 62px;gap:8px;margin:7px 0}#axisHud .axis i{height:5px;border-radius:0}
  #axisHud .axis span:last-child{text-align:right;font-size:12px;color:#fff}
  #liveChartWrap{order:5;min-height:132px;padding:10px 11px 7px;border:1px solid var(--rail-line,#c6ced5);background:var(--card,#fff)}
  #liveChartWrap .cap{display:flex;justify-content:space-between;gap:12px;font-size:10px;font-weight:700;color:var(--rail-muted,#65717c)}
  #liveChartWrap .cap b{color:var(--rail-ink,#15202b)}#speed{display:block;width:100%;height:96px;margin-top:5px}
  #phaseRail{order:6;position:static;width:100%;padding:10px 11px;background:var(--card,#fff);border:1px solid var(--rail-line,#c6ced5);border-radius:0;box-shadow:none}
  #phaseRail .phaseTitle{font-size:9.5px;color:var(--rail-muted,#65717c)}#phaseSegments{height:25px}
  .phaseSeg{font-size:9px}.phaseSeg.active{box-shadow:inset 0 0 0 2px #0f2740}.phaseSeg:nth-child(2).active{background:var(--accent,#17365d)}
  #legend{display:none!important}
  #railFacts{order:7;margin-top:0;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rail-line,#c6ced5);border:1px solid var(--rail-line,#c6ced5)}
  #railFacts div{padding:9px 8px;background:var(--card,#fff)}#railFacts b{display:block;font:700 14px/1 Consolas,monospace;color:var(--rail-ink,#15202b)}
  #railFacts span{display:block;margin-top:5px;font-size:8.5px;color:var(--rail-muted,#65717c)}
  #slotMapWrap{order:4;flex:1 1 240px;min-height:220px;display:flex;flex-direction:column;overflow:hidden;
    padding:10px 11px 9px;border:1px solid var(--rail-line,#c6ced5);background:var(--card,#fff)}
  #slotMapWrap .mapHead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  #slotMapWrap .mapHead b{display:block;font-size:11px;line-height:1.2}#slotMapWrap .mapHead span{display:block;margin-top:3px;color:var(--rail-muted,#65717c);font:8.5px/1.25 Consolas,monospace}
  #slotMapWrap .mapHead strong{font:800 18px/1 Consolas,monospace;color:var(--rail-ink,#17202b)}
  #slotMapWrap .mapRule{display:flex;align-items:center;gap:7px;margin-top:7px;padding:5px 7px;background:#eef1f3;color:#35414a;font:700 9px/1.2 Consolas,"Microsoft YaHei",monospace}
  #slotMapWrap .hatch{width:18px;height:10px;flex:none;background:repeating-linear-gradient(135deg,#65727d 0 3px,#a8b1b8 3px 5px)}
  #slotMap{display:block;flex:1 1 auto;width:100%;min-height:120px;margin-top:6px}
  #slotMapWrap .mapKey{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:5px;color:var(--rail-muted,#65717c);font-size:8.5px}
  #slotMapWrap .mapKey i{display:inline-block;width:10px;height:10px;margin-right:3px;vertical-align:-1px;border:1px solid #71808b}
  #slotMapWrap .mapKey .free{background:#e9edef}.mapKey .target{background:#f3c900}.mapKey .moving{background:#ff6a00;border-color:#7a2f00;border-radius:50%}
  #slotMapWrap .mapKey .gradeChips{display:inline-flex;align-items:center;gap:2px;margin-right:3px;vertical-align:-2px}
  #slotMapWrap .mapKey .gradeChips i{width:8px;height:10px;margin:0;border:0}.mapKey .gradeChips .heavy{background:#102a43}.mapKey .gradeChips .mid{background:#006bb6}.mapKey .gradeChips .light{background:#42c7e6}
  #targetBeacon{position:absolute;z-index:7;min-width:160px;transform:translate(14px,-50%);pointer-events:none;
    padding:9px 11px 8px 14px;background:#f3c900;color:#101820;border-left:5px solid #101820;box-shadow:0 4px 16px #10182038}
  #targetBeacon:before{content:"";position:absolute;left:-19px;top:50%;width:18px;height:2px;background:#101820}
  #targetBeacon b{display:block;font:800 14px/1.05 "Microsoft YaHei",sans-serif;white-space:nowrap}
  #targetBeacon span{display:block;margin-top:5px;font:700 9px/1 Consolas,monospace;letter-spacing:.6px}
  #sceneCaption{position:absolute;z-index:6;left:calc(var(--rail-w,32%) + 20px);bottom:17px;padding:8px 11px;background:#17202bdc;color:#fff;
    font:10px/1.35 Consolas,"Microsoft YaHei",monospace;pointer-events:none}
  #reserveRuleBadge{position:absolute;z-index:6;right:18px;top:18px;display:flex;align-items:center;gap:9px;padding:8px 10px;
    background:#ffffffed;border:1px solid #aeb8bf;color:#26343e;box-shadow:0 4px 15px #17202b1f;pointer-events:none}
  #reserveRuleBadge i{width:25px;height:18px;background:repeating-linear-gradient(135deg,#65727d 0 4px,#aeb7be 4px 7px)}
  #reserveRuleBadge b{display:block;font-size:10px;line-height:1.15}#reserveRuleBadge span{display:block;margin-top:3px;color:#64717b;font:8.5px/1 Consolas,monospace}

  html[data-style="A"]{--rail-w:30%;--rail-bg:#f7f8fa;--scene-bg:#e9eef1;--card:#fff;--rail-ink:#17202b;--rail-muted:#65717c;--rail-line:#cbd2d8;--accent:#17365d;--axis-bg:#17202b}
  html[data-style="B"]{--rail-w:32%;--rail-bg:#eef4f8;--scene-bg:#eaf1f5;--card:#f8fbfd;--rail-ink:#173650;--rail-muted:#557085;--rail-line:#9fb4c3;--accent:#245b78;--axis-bg:#20475e}
  html[data-style="B"] #workHud{background-color:#eef4f8;background-image:linear-gradient(#66879b18 1px,transparent 1px),linear-gradient(90deg,#66879b18 1px,transparent 1px);background-size:20px 20px}
  html[data-style="B"] #taskline,html[data-style="B"] #liveChartWrap,html[data-style="B"] #phaseRail{box-shadow:4px 4px 0 #9fb4c32b}
  html[data-style="B"] #targetBeacon{background:#fff;border:2px solid #e3b900;border-left:6px solid #e3b900;color:#173650;box-shadow:none}
  html[data-style="C"]{--rail-w:28%;--rail-bg:#10161d;--scene-bg:#202830;--card:#17212b;--rail-ink:#f1f4f6;--rail-muted:#93a0ab;--rail-line:#33414d;--accent:#3d9dda;--axis-bg:#0b1015}
  html[data-style="C"] #workHud{box-shadow:16px 0 38px #0007}html[data-style="C"] #railHead .eyebrow{color:#ff3b30}
  html[data-style="C"] #targetBeacon{background:#f3c900;color:#111820;border-left-color:#ff3b30;box-shadow:0 7px 24px #0008}
  html[data-style="C"] #sceneCaption{background:#0c1116e8;border-left:3px solid #ff3b30}
  @media(max-width:1200px){#workHud{padding:18px 16px 14px;gap:9px}#railHead h1{font-size:18px}#liveChartWrap{min-height:116px}#speed{height:80px}#railFacts div{padding:7px 6px}}
  @media(max-height:800px){#workHud{padding:12px 14px 10px;gap:7px}#railHead{padding-bottom:7px}#railHead h1{font-size:18px;margin-top:2px}
    #taskline{padding:8px 9px}#taskline .primary{margin-top:3px;font-size:12px}#actionBadge{margin-top:6px;padding:4px 7px}#taskline .metaRow{margin-top:5px}
    #axisHud{padding:7px 9px}#axisHud b{margin-bottom:3px}#axisHud .axis{margin:4px 0}#axisHud .axis span:last-child{font-size:10px}
    #slotMapWrap{min-height:145px;padding:7px 8px 6px}#slotMapWrap .mapRule{margin-top:4px;padding:3px 6px}#slotMapWrap .mapKey{margin-top:2px}
    #liveChartWrap{min-height:94px;padding:6px 8px 4px}#speed{height:66px;margin-top:2px}#phaseRail{padding:6px 8px}#phaseSegments{height:21px}
    #railFacts div{padding:5px 6px}#railFacts b{font-size:12px}#railFacts span{margin-top:3px}#sceneCaption{bottom:10px}}

  /* A+C：算法证据与档3事件流共用左栏；无独立数据页、无第二摄像头。 */
  #workHud{gap:8px;padding:16px 16px 12px}
  #railHead{padding-bottom:8px}#railHead h1{font-size:19px}
  #railHead{order:0}#runtimeControls{order:1}#taskline{order:2;padding:9px 10px}#taskline .primary{font-size:12.5px}#actionBadge{margin-top:7px;padding:4px 7px}
  #runtimeControls{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;padding:7px 8px;border:1px solid var(--rail-line,#c6ced5);background:var(--card,#fff)}
  #runtimeControls label{display:grid;gap:3px;color:var(--rail-muted,#65717c);font:8px/1.1 Consolas,"Microsoft YaHei",monospace}
  #runtimeControls select{width:100%;height:25px;padding:0 5px;border:1px solid #aeb8bf;background:#fff;color:#17202b;font:10px/1 "Microsoft YaHei",sans-serif}
  #runtimeActions{grid-column:1/4;display:flex;align-items:center;gap:5px}#runtimeActions button{height:25px;padding:0 8px;border:1px solid #17365d;background:#fff;color:#17365d;cursor:pointer;font-size:9px}
  #traceLoadState{margin-left:auto;color:#65717c;font:8px/1.2 Consolas,monospace}#traceErrorHost{grid-column:1/4;padding:6px 7px;border-left:3px solid #b71c1c;background:#fff0f0;color:#7c2020;font-size:8.5px}
  #traceErrorHost[hidden]{display:none}#traceErrorHost .s3-trace-error{display:flex;align-items:center;gap:5px;flex-wrap:wrap}#traceErrorHost button{margin-left:auto}
  #decisionWrap{order:3;padding:9px 10px;border:1px solid var(--rail-line,#c6ced5);background:var(--card,#fff)}
  #decisionWrap .dHead{display:flex;justify-content:space-between;gap:8px;align-items:center;font-size:10px;color:var(--rail-muted,#65717c)}
  #decisionWrap .dHead b{font-size:11px;color:var(--rail-ink,#15202b)}
  #decisionWrap .proofLead{margin-top:6px;padding:5px 7px;background:#edf2f6;color:var(--rail-muted,#65717c);font:9px/1.3 "Microsoft YaHei",sans-serif}
  #decisionWrap .proofLead.proofOk{border-left:3px solid #2e7d32;color:#255f29}
  #decisionWrap .selectionSummary{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:6px;padding:5px 7px;background:#eaf1f6;color:#52616c;font:9px/1.2 "Microsoft YaHei",sans-serif}

  html[data-s3-layout="A"] #workHud #diffMapWrap .diffKey .dNeg{background:#0b6fbf}

  /* ================================================================
     0716 方案A · 进度轴驱动(用户两次确认,规格=design_reviews/0716_s3_ia_review/spec_a_freeze.md)
     作用域 html[data-s3-layout="A"] 由 s3_layout_a_interactions.js 设置;
     runtime/store 零改动:仅 CSS 重塑 + DOM 搬运 + 文本治理。

  html[data-s3-layout="A"]{--rail-w:clamp(296px,23vw,352px);--topbar-h:46px;--axis-h:56px}

  html[data-s3-layout="A"] #topbarA{position:absolute;z-index:12;top:0;left:0;right:0;height:var(--topbar-h);

  html[data-s3-layout="A"] #topbarA #traceLoadState{margin-left:4px;color:#17365d;text-decoration:underline;cursor:pointer}
  html[data-s3-layout="A"] #topbarA #traceErrorHost{position:absolute;top:100%;left:0;right:0;z-index:30}

  /* -- 左栏:纵排 决策卡 → 终点统计 → 2D 小卡 -- */
  html[data-s3-layout="A"] #workHud{inset:var(--topbar-h) auto 0 0;width:var(--rail-w);
    display:flex;flex-direction:column;gap:7px;padding:8px 9px;overflow:hidden;border-top:0}

    align-self:stretch!important;width:auto!important}
    /* 0718 M1b:5 轨 = mapHead/mapRule/三联(可缩)/mapKey(≥1600 才显,否则空轨塌 0)/差异热力图(diffMapWrap 用 grid-row:-2/-1 钉末行 1fr,吃三联下方余量) */
  html[data-s3-layout="A"] #slotMap{width:100%!important;height:auto!important;min-height:0!important;
    max-width:100%;max-height:100%;aspect-ratio:2.55/1;justify-self:center;align-self:start;margin:4px auto 0;flex:none!important}

    background:#17202bcc;color:#fff;font:9px/1.4 "Microsoft YaHei",sans-serif;pointer-events:none}
  /* 图例与 2D/3D 采样色同步(0716):三级色改渲染视觉色;随载货物图例改为“分级色+目标黄描边”与实际绘制一致 */

  html[data-s3-layout="A"] #slotMapWrap .mapKey .moving{background:#4ea9c2;border:2px solid #ffd400;border-radius:50%}
  /* 取货指标注解(赛题“存取效率”回应,E2) */
  html[data-s3-layout="A"] #retrievalNote{margin-top:5px;padding:5px 7px;border-left:3px solid #17365d;background:#edf2f6;
    color:#44525c;font:9px/1.45 "Microsoft YaHei",sans-serif}

  /* -- 进度轴:fillBookmarks 重塑(全页唯一计数处) -- */
  html[data-s3-layout="A"] #progressAxisHost{position:absolute;z-index:8;top:var(--topbar-h);left:var(--rail-w);right:0;height:var(--axis-h);
    background:#fff;border-bottom:1px solid #b9c3ca;box-shadow:0 2px 8px #17202b0d}
  html[data-s3-layout="A"] #fillBookmarks{grid-area:auto;position:relative;height:100%;display:flex;align-items:center;gap:16px;
    padding:0 16px;border:0;background:transparent}
  html[data-s3-layout="A"] #fillBookmarks .fillHead{margin:0;flex:none;display:block}
  html[data-s3-layout="A"] #fillBookmarks .fillHead b{font-size:11.5px;white-space:nowrap}
  html[data-s3-layout="A"] #fillBookmarks .fillHead span{display:block;margin-top:2px;font-size:7.5px;white-space:nowrap}
  html[data-s3-layout="A"] #fillBookmarkButtons{flex:1 1 auto;position:relative;display:block;height:34px;min-width:220px}
  html[data-s3-layout="A"] #fillBookmarkButtons::before{content:"";position:absolute;left:0;right:0;top:16px;height:3px;background:#d9dde1}
  html[data-s3-layout="A"] #fillBookmarkButtons .axisFill{position:absolute;left:0;top:16px;height:3px;background:#0b6fbf;width:var(--axis-fill,0%);transition:width .2s linear}
  html[data-s3-layout="A"] #fillBookmarkButtons button{position:absolute;top:7px;width:21px;height:21px;margin-left:-11px;padding:0;
    border:2px solid #0b6fbf;border-radius:50%;background:#fff;color:transparent;font-size:0;line-height:0;cursor:pointer;box-shadow:none}
  html[data-s3-layout="A"] #fillBookmarkButtons button small{display:none}
  html[data-s3-layout="A"] #fillBookmarkButtons button.axisDone{background:#0b6fbf}
  html[data-s3-layout="A"] #fillBookmarkButtons button[aria-current="true"]{border-color:#ff000f;background:#ff000f;box-shadow:0 0 0 4px #ff000f2b}
  html[data-s3-layout="A"] #fillBookmarkButtons button:focus-visible{outline:3px solid var(--amber);outline-offset:3px}
  html[data-s3-layout="A"] #fillBookmarkButtons button::after{content:attr(data-axis-label);position:absolute;top:24px;left:50%;
    transform:translateX(-50%);color:#75828c;font:8.5px/1 Consolas,monospace;white-space:nowrap;display:none}
  html[data-s3-layout="A"] #axisRight{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:2px;padding-right:2px}
  html[data-s3-layout="A"] #fillEvidence{margin:0;border:0;display:flex;gap:0}
  html[data-s3-layout="A"] #fillEvidence span{padding:0 9px;border-right:1px solid #d6dde2;font-size:8px;white-space:nowrap;text-align:right}
  html[data-s3-layout="A"] #fillEvidence span:last-child{border-right:0;padding-right:0}
  html[data-s3-layout="A"] #fillEvidence b{font-size:11px}
  html[data-s3-layout="A"] #releaseBadge{position:static;padding:0;border:0;background:transparent;box-shadow:none;
    color:#75828c;font:7.5px/1.3 Consolas,monospace;white-space:nowrap}
  html[data-s3-layout="A"] #releaseBadge b{display:inline;color:#5d6a74;font-size:7.5px}

  /* -- 3D 区:让位给顶栏+进度轴;路径图例移入场景左下 -- */
  html[data-s3-layout="A"] #gl{left:var(--rail-w);top:calc(var(--topbar-h) + var(--axis-h))}
  html[data-s3-layout="A"] #reserveRuleBadge{position:absolute;z-index:6;grid-area:auto;left:calc(var(--rail-w) + 14px);
    right:auto;top:auto;width:max-content;height:auto;
    bottom:calc(var(--scene-dock-h) + var(--scene-dock-bottom) + var(--scene-dock-gap) + 10px);
    display:flex;align-items:center;justify-content:flex-start;gap:8px;padding:5px 9px;background:#ffffffd9;border:1px solid #b8c2ca;
    color:#53616b;box-shadow:0 2px 10px #17202b17;pointer-events:none;font:700 7.5px/1 "Microsoft YaHei",sans-serif}
  html[data-s3-layout="A"] #releaseBadgeAnchor{display:none}

  /* -- dock:0717 #28 用户拍板四格并三格——当前作业(含七段微条,约占半幅、货物大字) | 遥测 | 目标货位卡 -- */
  html[data-s3-layout="A"] #viewport{--scene-dock-h:92px}
  html[data-s3-layout="A"] #sceneDock{grid-template-columns:minmax(430px,1.92fr) minmax(230px,1fr) minmax(170px,.78fr)}
  html[data-s3-layout="A"] #sceneDock>#sceneCaption{grid-area:auto;grid-column:1;grid-row:1}
  html[data-s3-layout="A"] #sceneDock>#sceneTelemetry{grid-area:auto;grid-column:2;grid-row:1}
  html[data-s3-layout="A"] #sceneDock>#targetCard{grid-column:3;grid-row:1}
  /* 0717 #28 二轮:目标货位卡(接管 3D 黄标牌文字;amber 左条,入库完成转绿) */
  html[data-s3-layout="A"] #targetCard{padding:6px 11px;background:#fff;border-left:4px solid var(--amber);
    display:grid;grid-template-rows:auto auto auto;align-content:center;gap:2px;transition:border-color .2s}
  html[data-s3-layout="A"] #targetCard.done{border-left-color:#2f9e4f}
  html[data-s3-layout="A"] #targetCard .targetHead{display:flex;justify-content:space-between;align-items:center;gap:6px}
  html[data-s3-layout="A"] #targetCard .targetHead b{color:#5d6972;font-size:9px;font-weight:700}
  html[data-s3-layout="A"] #targetCardState{padding:1px 6px 2px;background:var(--amber);color:#17202b;
    font:700 8px/1.2 "Microsoft YaHei",sans-serif;white-space:nowrap}
  html[data-s3-layout="A"] #targetCard.done #targetCardState{background:#2f9e4f;color:#fff}
  html[data-s3-layout="A"] #targetCardSlot{font:800 17px/1.1 Consolas,"Microsoft YaHei",monospace;color:#0f1c27;letter-spacing:.5px}
  html[data-s3-layout="A"] #targetCard.done #targetCardSlot{color:#1d6b2e}
  html[data-s3-layout="A"] #targetCardDetail{color:#68747d;font:8px/1.2 "Microsoft YaHei",sans-serif;white-space:nowrap}
  /* 0717 #28 二轮:3D 黄标牌+引线退役(target-card 模式);图形高亮(发光壳/面框/箭头)独立承担定位 */
  html[data-s3-target-card="1"] #targetBeacon,html[data-s3-target-card="1"] #labelLeaders{display:none!important}
  /* 0717 #28 二轮:镜头与倍率簇进进度轴行;0718 M1 用户拍板「就地风格化」——
     与轴行节点同色系(#0b6fbf),去红粗滑块,按钮/字号/分隔线全部对齐轴行,融入而非移植感。 */
  html[data-s3-layout="A"] #fillBookmarks #sceneTools{flex:none;display:flex;align-items:center;gap:8px;
    padding:0 14px 0 12px;border-left:1px solid #e0e5e9;background:transparent;color:#26343e;pointer-events:auto}
  html[data-s3-layout="A"] #fillBookmarks #sceneTools .toolHead{font:700 8.5px/1.15 "Microsoft YaHei",sans-serif;color:#5d6972;white-space:nowrap}
  html[data-s3-layout="A"] #fillBookmarks #sceneTools .toolHead span{display:block;color:#8a949c;font-size:6.5px;font-weight:500}
  html[data-s3-layout="A"] #fillBookmarks #sceneTools .toolRow{display:flex;align-items:center;gap:7px;margin:0}
  html[data-s3-layout="A"] #fillBookmarks #sceneTools button{height:22px;padding:0 10px;font-size:9px;font-weight:700;
    border:1.5px solid #0b6fbf;background:#fff;color:#0b6fbf;box-shadow:none;cursor:pointer}
  html[data-s3-layout="A"] #fillBookmarks #sceneTools button:hover{background:#0b6fbf;color:#fff}
  html[data-s3-layout="A"] #fillBookmarks #sceneTools input[type="range"]{width:104px;min-height:18px;accent-color:#0b6fbf}
  html[data-s3-layout="A"] #fillBookmarks #sceneTools #playbackValue{min-width:40px;font:800 9.5px/1 Consolas,monospace;color:#17365d}
  html[data-s3-layout="A"] #fillBookmarks #sceneTools .toolNote{display:none}
  html[data-s3-layout="A"] #sceneCaption{padding:6px 12px 5px;align-content:stretch;gap:2px 8px;
    grid-template-columns:auto minmax(0,1fr) auto auto;grid-template-rows:auto auto minmax(0,1fr);
    grid-template-areas:"label cargo meta facts" "action action action action" "phase phase phase phase"}
  html[data-s3-layout="A"] #sceneCaption .dockLabel{align-self:center}
  html[data-s3-layout="A"] #sceneCaption #sceneCargoMeta{grid-area:cargo;justify-self:end;align-self:center}
  html[data-s3-layout="A"] #sceneCaption #sceneActionMeta{grid-area:meta;align-self:center}
  html[data-s3-layout="A"] #sceneCaption #railFactsDockSlot{grid-area:facts;justify-self:end;align-self:center;color:#5d6972;font:8px/1.15 Consolas,"Microsoft YaHei",monospace;white-space:nowrap}
  html[data-s3-layout="A"] #sceneCaption #sceneActionText{font-size:15px;font-weight:800;color:#0f1c27;letter-spacing:.2px}
  html[data-s3-layout="A"] #sceneCaption #sceneActionText .gradeDot{display:inline-block;width:10px;height:10px;margin:0 6px 0 0;vertical-align:-1px}
  html[data-s3-layout="A"] #sceneCaption #sceneActionText em{font-style:normal;margin-left:7px;padding:1px 6px 2px;
    background:#fdf3cf;border:1px solid #e0b600;color:#5b4a00;font-size:12.5px;font-weight:800;white-space:nowrap}
  /* 七段微条并入当前作业格:步骤名由微条题行唯一承担,横贯半幅更舒展 */
  html[data-s3-layout="A"] #sceneCaption #phaseRail{grid-area:phase;position:static;width:auto;min-height:0;margin-top:1px;
    padding:3px 0 0;border:0;border-top:1px dashed #d3dae0;background:transparent;
    display:grid;grid-template-rows:auto 7px minmax(0,1fr);gap:2px;overflow:visible}
  html[data-s3-layout="A"] #phaseRail .phaseTitle{margin:0;font-size:8px}
  html[data-s3-layout="A"] #phaseRail #phaseNow{font-weight:800;color:#17365d}
  html[data-s3-layout="A"] #phaseTimeScale{height:7px}
  html[data-s3-layout="A"] #phaseSegments{min-height:0;gap:2px}
  html[data-s3-layout="A"] .phaseSeg{padding:1px 1px;cursor:help;grid-template-rows:auto;gap:0 3px}
  html[data-s3-layout="A"] .phaseSeg .phaseDuration{display:none}
  html[data-s3-layout="A"] .phaseSeg .phaseName{font-size:7.5px}
  html[data-s3-layout="A"] .phaseSeg:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
  @media(max-height:780px){html[data-s3-layout="A"] #viewport{--scene-dock-h:84px}
    html[data-s3-layout="A"] #sceneCaption #sceneActionText{font-size:13px}}

  /* -- 共享浮层(节点快照 / 七步说明 / 证据链) -- */
  .s3aPop{position:absolute;z-index:80;width:250px;background:#fff;border:1px solid #c9ced3;border-top:3px solid var(--abb-red);
    box-shadow:0 8px 26px #17202b36;padding:10px 12px;font:10px/1.5 "Microsoft YaHei",sans-serif;color:#1c2932;display:none}
  .s3aPop.show{display:block}
  .s3aPop h4{margin:0 0 5px;font-size:11px;line-height:1.3}
  .s3aPop table{width:100%;border-collapse:collapse}
  .s3aPop td{padding:2px 0;font-size:10px}
  .s3aPop td:last-child{text-align:right;font-weight:700;font-family:Consolas,monospace}
  .s3aPop .note{margin-top:5px;color:#8a9096;font-size:8.5px;line-height:1.4}
  .s3aPop .rows{border-top:1px dashed #d4d7da;margin-top:5px;padding-top:4px}
  .s3aPop .rows div{display:flex;justify-content:space-between;gap:8px;padding:1.5px 0}
  .s3aPop .rows span:last-child{white-space:nowrap;font-family:Consolas,monospace;font-weight:700}
  .s3aPop code{font:9px/1.4 Consolas,monospace;word-break:break-all;color:#17365d}

  /* -- 2D 放大覆盖层(slotMapWrap 搬入,canvas 自适应重画) -- */
  #s3MapOverlay{position:absolute;z-index:60;inset:0;display:none;align-items:center;justify-content:center;background:#17202b66}
  #s3MapOverlay.open{display:flex}
  #s3MapOverlay .mapDock{width:min(78vh,720px);max-width:88%;background:#fff;border-top:4px solid var(--abb-red);
    padding:12px 46px 10px 14px;box-shadow:0 18px 50px #0f171e59;position:relative}
  #s3MapOverlay .mapDockClose{position:absolute;right:8px;top:6px;width:26px;height:26px;border:1px solid #18232c;background:#fff;
    color:#18232c;font:500 17px/1 Arial,sans-serif;cursor:pointer}
  html[data-s3-layout="A"] #s3MapOverlay #slotMapWrap{flex:none;order:0;min-height:0;cursor:default;border:0;padding:0;overflow:visible}
  html[data-s3-layout="A"] #s3MapOverlay #slotMap{min-height:0!important;margin:8px auto 0;max-height:none}
  html[data-s3-layout="A"] #s3MapOverlay .mapKey{display:flex!important;margin-top:8px;font-size:9px;gap:10px}
  html[data-s3-layout="A"] #s3MapOverlay .zoomHint{display:none}

  /* -- 1600×900 及以上:节点百分比标签常显、2D 图例常显 -- */
  @media(min-width:1600px) and (min-height:860px){
    html[data-s3-layout="A"]{--topbar-h:50px;--axis-h:62px}
    html[data-s3-layout="A"] #topbarA #railHead h1{font-size:17px}
    html[data-s3-layout="A"] #fillBookmarkButtons button::after{display:block}
    html[data-s3-layout="A"] #fillBookmarks .fillHead b{font-size:13px}
    html[data-s3-layout="A"] #fillEvidence b{font-size:12.5px}
    html[data-s3-layout="A"] #slotMapWrap .mapKey{display:flex;flex-wrap:wrap;margin-top:5px;padding-right:112px}
    html[data-s3-layout="A"] #slotMapWrap .zoomHint{bottom:6px}
    html[data-s3-layout="A"] .phaseSeg .phaseName{font-size:8.5px}
  }

  /* ================================================================
     W6(2026-07-20,用户拍板「照 02 语言全面重做」)· 01 页 A 壳终态收口
     蓝本 = 02_入出闭环.html(commit d9b4dab,只读不改)的 0718 R2 → T5 → W1-7 → 0720 版B 落地状态,
     以下按其等价结构口径搬入。01 保持 rail-left(data-first;s3_shell_v2.css 默认映射,
     不设 data-s3-rail)。01 特有结构(三算法 2D 三联对比/终态货-格差异图/目标货位卡/
     入库进度轴/七步条/固定拟真档说明牌)功能不动,只套本节 tokens/间距/字号/折叠/白化语言。
     本节按仓库既有惯例整段追加于末尾,不回改前文历史层("后代覆盖为准"),避免源序级联翻车;
     0716/0717/0718 各历史小节的定位类声明(position/inset/order 等)在此逐条覆盖为终态值。
     ================================================================ */
  html[data-s3-layout="A"]{--topbar-h:40px}

  /* -- 顶栏:40px 单行,控件统一 30px 高基线(同 02 W1-5) -- */
  html[data-s3-layout="A"] #topbarA{height:var(--topbar-h);gap:14px;padding:0 14px}
  html[data-s3-layout="A"] #topbarA #railHead h1{font-size:15px}
  html[data-s3-layout="A"] #topbarA #railHead .eyebrow{font-size:7.5px}
  html[data-s3-layout="A"] #topbarA #runtimeControls{gap:12px}
  html[data-s3-layout="A"] #topbarA .scenarioGroup{display:flex;align-items:center;min-width:0;background:#f2f4f6;border:1px solid #dde3e8;padding:2px 6px}
  html[data-s3-layout="A"] #topbarA .scenarioGroup label+label{border-left:1px solid #d6dde2;margin-left:9px;padding-left:9px}
  html[data-s3-layout="A"] #topbarA #runtimeControls label{display:flex;align-items:center;gap:5px;height:30px;font-size:8.5px;white-space:nowrap;color:#59656e;font-weight:700}
  html[data-s3-layout="A"] #topbarA #runtimeControls select{width:auto;min-width:104px;height:30px;border:0;background:transparent;font-size:9.5px;padding:0 4px;color:#17202b;font-weight:700}
  html[data-s3-layout="A"] #topbarA #runtimeActions{margin-left:auto;display:flex;align-items:center;gap:9px;grid-column:auto;flex-wrap:nowrap}
  html[data-s3-layout="A"] #topbarA #runtimeActions .btnSet{display:flex;align-items:center;gap:5px}
  html[data-s3-layout="A"] #topbarA #runtimeActions .btnSet+.btnSet{border-left:1px solid #d6dde2;padding-left:10px}
  html[data-s3-layout="A"] #topbarA #runtimeActions button{height:30px;min-height:30px;border:1px solid #33404a;background:#fff;color:#1d2b34;font-size:9px;padding:0 10px;cursor:pointer}
  html[data-s3-layout="A"] #topbarA #runtimeActions button:hover{background:#17365d;color:#fff;border-color:#17365d}
  /* 0722c 过时审计 P3:绿底状态签皮肤清除——「证据中心」单键按 02 顶栏按钮语言(白底细边,学术工程风);
     验证态是抽屉内容的事实行,不做按钮配色。 */
  html[data-s3-layout="A"] #topbarA #traceLoadState{height:30px;display:flex;align-items:center;padding:0 10px;margin-left:4px;
    background:#fff;color:#17202b;border:1px solid #aeb8bf;font-weight:700;font-size:9px;white-space:nowrap;box-sizing:border-box;text-decoration:none;cursor:pointer}
  html[data-s3-layout="A"] #topbarA #traceLoadState:hover{background:#eef1f3}
  #evidencePop .evVerified{margin-left:8px;padding:2px 7px;background:#eef6ee;color:#1c6b34;font:700 9px/1.4 "Microsoft YaHei",sans-serif;vertical-align:middle;white-space:nowrap}
  /* 0722d 回迁组件:dock 赛段走势列 + 顶栏终态总分一行(压缩空区+内容回迁,双向取中拍板) */
  #dockRaceTrend{padding:6px 9px;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:3px}
  #dockRaceTrend .trendHead{display:flex;justify-content:space-between;font:700 8.5px/1.2 Consolas,monospace;color:#69717a}
  #dockRaceTrend svg{width:100%;height:100%;min-height:0;display:block}
  #dockRaceTrend .trendFoot{color:#7a8590;font:7.5px/1.2 Consolas,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* order:1 与 runtimeControls 平级且 DOM 在前→落于 logo 与右控件群之间的中段空白;auto margin 吃左空 */
  #topbarRaceSummary{display:flex;align-items:center;gap:7px;order:1;margin-left:auto;margin-right:8px;padding:0 10px;white-space:nowrap}
  #topbarRaceSummary .rsLabel{color:#6a747d;font:700 8px/1.2 Consolas,monospace}
  #topbarRaceSummary .rsItem{display:flex;align-items:center;gap:3px;font:700 9.5px/1 Consolas,monospace;color:#3c4750}
  #topbarRaceSummary .rsItem i{width:9px;height:9px;display:inline-block}
  #topbarRaceSummary .rsItem.seq i{background:#8b919a}#topbarRaceSummary .rsItem.near i{background:#5b7a94}#topbarRaceSummary .rsItem.score i{background:var(--abb-red,#ff000f)}
  #topbarRaceSummary .rsLead{padding:3px 7px;background:#fff7f5;border-left:3px solid #ff000f;color:#5c1010;font:800 9.5px/1 Consolas,monospace}
  #reserveRuleBadge .heatKey i,#slotMapWrap .mapKey .heatKey i{display:inline-block;height:8px;margin-right:3px;vertical-align:middle}
  #reserveRuleBadge .heatToggle{margin-left:6px;color:#52616c;font-size:8px;white-space:nowrap;cursor:pointer}
  #reserveRuleBadge .heatToggle input{vertical-align:middle;margin:0 2px 0 0}
  /* 情景配置组:算法 + 拟真档说明牌 + 货物画像,融为一个灰底单元(同 02 0719d 绿框) */
  #tierFixedTag{height:30px;padding:0 8px;box-sizing:border-box}
  #tierFixedTag b{font-size:9px}#tierFixedTag small{font-size:6.5px}

  /* -- 右栏 rail:flex 纵列,order 定序(进度轴→决策卡→批次KPI塔→2D三联→七步条),块间 10px -- */
  html[data-s3-layout="A"] #workHud{display:flex;flex-direction:column;gap:10px;padding:8px 9px;overflow:hidden;
    background:#f6f7f8;border-right:1px solid var(--rail-line,#d6dde2);border-top:0;box-shadow:none}
  html[data-s3-layout="A"] #decisionWrap{order:1;flex:none;align-self:stretch}
  html[data-s3-layout="A"] #insightStack{order:2;flex:none;display:flex;flex-direction:column;gap:10px}
  html[data-s3-layout="A"] #slotMapWrap{order:3}
  html[data-s3-layout="A"] #phaseRail{order:4;flex:none;position:static;width:auto;align-self:stretch}
  #railFacts{display:none}

  /* -- 入库进度轴:从「顶栏下独立横条」迁入右栏顶部(同 02 0720 版B),order:-1 恒居首 -- */
  html[data-s3-layout="A"] #progressAxisHost{position:static;order:-1;flex:none;z-index:auto;height:auto;
    left:auto;right:auto;top:auto;width:auto;background:transparent;border:0;
    border-bottom:1px solid var(--rail-line,#d6dde2);box-shadow:none;padding:0 0 8px;margin-bottom:0}

  html[data-s3-layout="A"] #slotMapWrap .mapHead b,html[data-s3-layout="A"] #processGuide .processGuideHead b,
  html[data-s3-layout="A"] #phaseRail .phaseTitle,html[data-s3-layout="A"] #fillBookmarks .fillHead b,
  html[data-s3-layout="A"] #axisHud>b,html[data-s3-layout="A"] #sceneCaption .dockLabel,

  /* -- 右栏块统一 padding、分隔线 1px #d6dde2(块内已有 border,此处仅补齐未覆盖到的) -- */
  html[data-s3-layout="A"] #decisionWrap,html[data-s3-layout="A"] #traceStats,html[data-s3-layout="A"] #slotMapWrap,

  html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(3) b,html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(4) b{font-size:17px}
  /* 次级两格:约束违规半宽、完工/行程守恒量占宽(数值较长);守恒量自带 .conservedCell 虚线金框
     (governanceStyle 运行时注入,不在此覆盖其底色,只给位置) */
  html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(5){grid-row:3;grid-column:1/3;background:#f4f6f7;border:1px solid #e1e5e8}

  /* -- 2D 三算法对比区:方形撑满(高度主导,同 02 W1-3 修法) -- */
  html[data-s3-layout="A"] #slotMapWrap{display:flex!important;flex-direction:column;height:auto;max-height:none}
  html[data-s3-layout="A"] #slotMap{width:auto!important;height:auto!important;max-width:100%;aspect-ratio:2.55/1;

  html[data-s3-layout="A"] #decisionWrap .cand,html[data-s3-layout="A"] #decisionWrap .decisionLine{font-size:9px}

  /* -- 折叠收纳(拍板「整栏收边+逐块折叠+持久化」,同 02 W1-7):右栏/底 dock 整栏收 26px 边条,
     栏内块头可单独折叠。localStorage 键 s3_collapse_01_v1,与 02 的 s3_collapse_v1 区分;
     机制同 02:收展只改既有 --rail-w/--scene-dock-h 两变量,#gl/#sceneDock 等引用它们的规则自动跟随。 -- */
  html[data-s3-layout="A"] #railCollapseBtn{order:-2;flex:none;display:flex;align-items:center;justify-content:center;gap:5px;
    height:24px;margin:0;padding:0 8px;border:1px solid var(--rail-line,#d6dde2);background:#fff;

  /* 0722d 用户报 bug:收起后文字残留——0722b 各显示规则带 !important(slotMapWrap 的
     display:flex!important 等)压过本条非 important 的 none;同挂 !important 终结军备竞赛。 */
  html[data-s3-layout="A"] #workHud.is-collapsed>*:not(#railCollapseBtn){display:none!important}

    padding:10px 2px;gap:8px;writing-mode:vertical-rl;text-orientation:upright}

  html[data-s3-layout="A"] #dockCollapseBtn{position:absolute;z-index:5;top:4px;right:6px;display:flex;align-items:center;gap:3px;
    height:18px;padding:0 7px;border:1px solid #9ea9b1;background:#ffffffed;color:#3d4a54;cursor:pointer;
    font:700 8px/1 "Microsoft YaHei",sans-serif;box-shadow:0 1px 4px #17202b26}
  html[data-s3-layout="A"] #dockCollapseBtn:hover{background:#f2f4f6}
  html[data-s3-layout="A"] #dockCollapseBtn .edgeArrow{display:inline-block;font-size:9px;transition:transform .15s}
  html[data-s3-layout="A"] #sceneDock.is-collapsed>*:not(#dockCollapseBtn){display:none}
  html[data-s3-layout="A"] #sceneDock.is-collapsed #dockCollapseBtn .edgeArrow{transform:rotate(180deg)}
  html[data-s3-layout="A"] #decisionWrap .dHead,html[data-s3-layout="A"] #slotMapWrap .mapHead,
  html[data-s3-layout="A"] #traceStats .statsHead,html[data-s3-layout="A"] #processGuide .processGuideHead,

  html[data-s3-layout="A"] #traceStats .statsHead::after,html[data-s3-layout="A"] #processGuide .processGuideHead::after,

  html[data-s3-layout="A"] #traceStats.railBlockCollapsed .statsHead::after,html[data-s3-layout="A"] #processGuide.railBlockCollapsed .processGuideHead::after,
  html[data-s3-layout="A"] #phaseRail.railBlockCollapsed .phaseTitle::after{transform:translateY(-50%) rotate(-90deg)}

  /* -- dock:白化四分列(当前作业货物行 | 轴状态·位置与速度 | 目标货位卡 | 2D 图例)-- */

  /* -- 当前作业格:大字货物行改芯片化(重量/体积/等级/热冷/热度/排名),同 02 W1-2 -- */

  /* 等级色沿用 01 自有 3D/2D 采样色(GRADE_CSS #366786/#4ea9c2/#abd1d8),与本页货位图、货架货物视觉同源,

  html[data-s3-layout="A"] #sceneCargoMeta .cgGrade-heavy{background:#366786;color:#fff}

  html[data-s3-layout="A"] #sceneCargoMeta .cgTime{font:400 9px/1.3 Consolas,monospace;color:#5d6972}

  /* -- 轴状态格:白化(原深色块 #17212a 全清),X/Y 五列均分,F 行保留但弱化(0720 命名总表同款标签) -- */
  html[data-s3-layout="A"] #sceneTelemetry{padding:6px 12px;display:grid;grid-template-columns:1fr;gap:0;

  html[data-s3-layout="A"] #axisHud .axis #xFill:after,html[data-s3-layout="A"] #axisHud .axis #zFill:after,html[data-s3-layout="A"] #axisHud .axis #forkFill:after{

  html[data-s3-layout="A"] #axisHud .axis span:nth-child(3){color:#17202b;font-size:9px;font-weight:700;text-align:right;font-family:Consolas,monospace}

  html[data-s3-layout="A"] #sceneTools .toolHead{display:none}
  html[data-s3-layout="A"] #sceneTools .toolRow{display:flex;align-items:center;gap:7px;margin:0}
  html[data-s3-layout="A"] #sceneTools button{height:24px;padding:0 9px;font:700 9px/1 "Microsoft YaHei",sans-serif;border:1px solid #17365d;background:#fff;color:#17365d;cursor:pointer}
  html[data-s3-layout="A"] #sceneTools button:hover{background:#17365d;color:#fff}
  html[data-s3-layout="A"] #sceneTools input[type="range"]{width:100px;min-height:20px;accent-color:#17365d}
  html[data-s3-layout="A"] #sceneTools #playbackValue{min-width:38px;font:800 9px/1 Consolas,monospace;color:#17365d;text-align:right}
  html[data-s3-layout="A"] #sceneTools .scaleEnds,html[data-s3-layout="A"] #sceneTools .toolNote{display:none}

  /* -- 可读性兜底:无 <7.5px 可见文字 -- */
  html[data-s3-layout="A"] #fillEvidence span{font-size:7.5px}
  html[data-s3-layout="A"] #reserveRuleBadge span{font-size:7.5px}
  html[data-s3-layout="A"] #processGuide .processGuideHead span{font-size:7.5px}

  /* -- 窄高视口(≤920px,覆盖 QA 1280×720 与 1600×900 两档)安全网 --
     实测(node 诊断脚本)根因:decisionWrap/traceStats/phaseRail/progressAxisHost 四块全 flex:none,
     在 720px 高度下四者合计已逼近 rail 总高,#slotMapWrap(唯一 flex:1 的块,三算法 2D 对比——
     01 的核心可视化)被挤压到 16px、canvas 0×0。修法:压缩四块的次要说明性子内容(供进阶查看的
     并列/冷门送远/评分分项解说 · 期望取货口径脚注),不删 DOM(只藏,内容仍可通过折叠按钮展开区域
     换取空间后完整可见),把让出的高度还给 2D 三联对比,这是 01 的功能主体,不能给说明性文字让路。 */
  @media(max-height:920px){
    html[data-s3-layout="A"] #workHud{gap:5px;padding:5px 7px}
    html[data-s3-layout="A"] #insightStack{gap:5px}
    /* 「容量节点」副题字号收紧但不隐藏——QA capacityNodeTermUnique 断言要求该术语可见恰好一次,
       与其余说明性文字(评分分项/并列/冷门送远解说)不同,它是唯一出现处,不能藏 */
    html[data-s3-layout="A"] #progressAxisHost{padding-bottom:5px}
    html[data-s3-layout="A"] #fillBookmarks .fillHead span{font-size:7.5px}
    html[data-s3-layout="A"] #fillBookmarkButtons{height:28px}
    html[data-s3-layout="A"] #fillBookmarkButtons::before,html[data-s3-layout="A"] #fillBookmarkButtons .axisFill{top:8px}
    html[data-s3-layout="A"] #fillBookmarkButtons button{top:2px}
    html[data-s3-layout="A"] #decisionWrap,html[data-s3-layout="A"] #traceStats,
    html[data-s3-layout="A"] #phaseRail{padding:4px 7px}
    /* 决策卡:核心(标题/选择依据/目标/候选审计/三候选行)常显;说明性子内容收起,不删 DOM */
    html[data-s3-layout="A"] #decisionWrap .tieNote,html[data-s3-layout="A"] #decisionWrap .reserveNote,
    html[data-s3-layout="A"] #decisionWrap .scoreBreakdown,html[data-s3-layout="A"] #decisionWrap .scoreFactorNote,
    html[data-s3-layout="A"] #decisionWrap .candidateTop{display:none}
    html[data-s3-layout="A"] #decisionWrap .decisionLine{padding:1px 0}
    html[data-s3-layout="A"] #decisionWrap .candidates{gap:2px}
    html[data-s3-layout="A"] #retrievalNote{display:none}
    html[data-s3-layout="A"] #traceStats .statsGrid{gap:4px;margin-top:4px}
    html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp{padding:4px 6px}
    html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(1),html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(2),
    html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(3),html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(4){min-height:38px}
    html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(1) b,html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(2) b,
    html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(3) b,html[data-s3-layout="A"] #traceStats .statsGrid .metricHelp:nth-child(4) b{font-size:13px}
    html[data-s3-layout="A"] #traceStats .statFinger{display:none}
    /* 2D 三联对比:压缩紧后仍是 rail 里唯一 flex-grow 的块,实测(诊断脚本)可用高度仍会把
       aspect-ratio 的"高度主导"算法反向拖成 83×33px 的不可读小图——改「宽度主导」(同 02
       overlay 浮层的成因手法):canvas 宽=撑满 wrap 内宽,高由宽反推,不再受挤压的纵向预算牵连;
       mapRule(预占规则脚注)收起,把行高让给画布与图例。 */
    html[data-s3-layout="A"] #slotMapWrap{min-height:184px}
    html[data-s3-layout="A"] #slotMapWrap .mapRule{display:none}
    html[data-s3-layout="A"] #slotMap{width:100%!important;height:auto!important;flex:none!important;align-self:stretch!important;margin-top:4px}
    html[data-s3-layout="A"] #phaseRail .phaseTitle{margin-bottom:3px}
    html[data-s3-layout="A"] .phaseSeg .phaseName{display:none}
    html[data-s3-layout="A"] #viewport{--scene-dock-h:104px}
    /* fontSize 保持 >=13px(不随 02 blueprint 的 12px 松动)——QA cargoHeadlineDominant 门槛
       fontSize>=13 是既有质量线,窄高视口收紧其它维度即可腾出空间,不靠降字号达标 */
    html[data-s3-layout="A"] #sceneCaption #sceneActionText{font-size:13px}
    html[data-s3-layout="A"] #sceneCaption{padding:4px 10px 3px}
    html[data-s3-layout="A"] #sceneCargoMeta{margin-top:2px;gap:3px 6px}
    html[data-s3-layout="A"] #sceneCargoMeta .cgChip{padding:1px 5px}
  }

  /* ================================================================
     0721 回灌 · 版A「算法赛马场」主版面(规格 docs/施工规格_回灌0721.md §1.2,变体
     design_mock_0721/01_变体A_赛马场.html 已验证代码搬回;30-seed 分布带取自变体B)。
     手法同变体注记:#workHud 实际是 display:flex;flex-direction:column(926 行),不是
     grid 容器,重排靠 flex order,不靠 grid-template-areas;既有同选择器 order 规则
     (735/926 行一带)specificity 与源码序都可能赢,故新 order/overflow 声明一律 !important。
     ================================================================ */
  html[data-s3-layout="A"]{--rail-w:60%}
  html[data-s3-layout="A"] #workHud{overflow-y:auto!important;overflow-x:hidden!important}
  #raceBanner{order:1!important}
  html[data-s3-layout="A"] #progressAxisHost{order:2!important;position:static!important}
  #raceGridsIntro{order:3!important}
  /* 排错记录(0721 回灌实测):历史 #slotMapWrap{flex:1 1 180px}(无 html[data-s3-layout] 前缀,
     见早期 Task 版式区)靠 per-property 层叠仍会赢过后续只设 order/min-height 的规则——flex-basis
     不受 min-height 名义约束,实测三联画布被压扁至 ~30px。这里显式整条 flex 简写 + !important 锁定,
     不靠 min-height 单项对赌。 */
  html[data-s3-layout="A"] #slotMapWrap{order:4!important;flex:0 0 460px!important;min-height:460px!important}
  /* 3D+dock 让位主区四图后仅余约 40% 宽,原 dock 三列 minmax 下限合计 830px 装不下——按新宽度预算收窄
     下限(比例大致保留),仍在 1280/1600/1920 三档测试宽度下正确显示。 */
  html[data-s3-layout="A"] #sceneDock{grid-template-columns:minmax(220px,1.92fr) minmax(120px,1fr) minmax(90px,.78fr)}
  #raceScoreboard{order:5!important}
  #raceFinalBoard{order:6!important}
  #raceSeedBand{order:7!important}
  html[data-s3-layout="A"] #decisionWrap{order:8!important}
  html[data-s3-layout="A"] #insightStack{order:9!important}
  html[data-s3-layout="A"] #phaseRail{order:10!important}
  html[data-s3-layout="A"] #slotMap{aspect-ratio:2.3/1!important}
  html[data-s3-layout="A"] #workHud #diffMapWrap{min-height:230px;margin-top:8px;padding-top:8px}
  html[data-s3-layout="A"] #workHud #diffMapWrap .diffHead span{display:block!important;font-size:8px!important;margin-top:2px}
  html[data-s3-layout="A"] #workHud #diffMapWrap .diffKey span:last-child{display:inline-flex!important}
  html[data-s3-layout="A"] #workHud #diffMap{max-height:220px}

  /* -- 共享卡片壳(赛马场四区块 + 决策解剖 + 证据抽屉共用) -- */
  .vPanel{border:1px solid var(--rail-line,#cbd2d8);background:var(--card,#fff);margin:8px 0;padding:9px 11px}
  .vPanel .vHead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;border-bottom:1px solid #e1e6e9;padding-bottom:5px;margin-bottom:7px}
  .vPanel .vHead b{font:800 11px/1.2 "Microsoft YaHei",sans-serif;color:#17202b}
  .vPanel .vHead span{font:8px/1.2 Consolas,monospace;color:#69717a;text-align:right}
  .vPanel .note{font:8.5px/1.4 "Microsoft YaHei",sans-serif;color:#5d656d;margin-top:6px}
  .spotCheck{margin-top:7px;padding:6px 8px;background:#eef2f5;border-left:3px solid #17365d;color:#3c4c5c;font:8.5px/1.4 Consolas,monospace}
  #raceBanner.vPanel{border:0;border-left:4px solid #ff000f;background:#fff7f5;font:700 10.5px/1.5 "Microsoft YaHei",sans-serif;color:#5c1010;padding:8px 11px}

  /* -- 赛段比分条:6 容量节点 × 三算法 -- */
  .raceNode{display:grid;grid-template-columns:56px 1fr 1fr;gap:10px;align-items:center;padding:5px 0;border-bottom:1px solid #eef1f3}
  .raceNode:last-child{border-bottom:0}
  .raceNode .nodeLabel{font:800 10px/1.25 Consolas,monospace;color:#17202b}
  .raceNode .nodeLabel small{display:block;font:400 8px/1 "Microsoft YaHei",sans-serif;color:#8a939c;margin-top:2px}
  .raceMetricLabel{display:block;font:700 8px/1.2 Consolas,monospace;color:#8a939c;margin-bottom:3px}
  .raceBarRow{display:grid;grid-template-columns:34px 1fr 56px;gap:5px;align-items:center;font:8.5px/1 Consolas,monospace;margin-top:2px}
  .raceBarRow span:first-child{color:#4c5963;font-weight:700}
  .raceBarRow span:last-child{text-align:right;color:#3c4650}
  .raceBarTrack{height:7px;background:#e7ebed;overflow:hidden}
  .raceBarTrack i{display:block;height:100%}
  .raceBarRow[data-algo="seq"] .raceBarTrack i{background:#8c969e}
  .raceBarRow[data-algo="near"] .raceBarTrack i{background:#4a6fa5}
  .raceBarRow[data-algo="score"] .raceBarTrack i{background:#ff000f}

  /* -- 终态总分牌:三算法并排矩阵,SEQ 基线列;涨跌徽章沿用既有 .statsDelta/.better/.worse -- */
  .finalMatrix{width:100%;border-collapse:collapse;font:9.5px/1.3 Consolas,monospace}
  .finalMatrix th,.finalMatrix td{padding:5px 7px;border-bottom:1px solid #e7ebed;text-align:right}
  .finalMatrix th:first-child,.finalMatrix td:first-child{text-align:left;font-family:"Microsoft YaHei",sans-serif;font-size:9.5px;color:#3c4650}
  .finalMatrix thead th{color:#69717a;font-weight:700;border-bottom:2px solid #c9d0d5;font-size:8.5px}
  .finalMatrix .baseCol{background:#f4f6f7}
  .finalMatrix .statsDelta{position:static;margin-left:4px}

  /* -- 30-seed 分布带(变体B 实现,置总分牌旁):min–max 条 + 均值竖线,非百分位 -- */
  .seedRow{margin-top:8px}
  .seedRow .sHead{font:700 8.5px/1.2 Consolas,monospace;color:#4c5963;margin-bottom:3px}
  .seedBarLine{display:grid;grid-template-columns:38px 1fr 44px;gap:5px;align-items:center;font:8px/1 Consolas,monospace;margin-top:2px}
  .seedBarLine span:first-child{color:#4c5963;font-weight:700}
  .seedBarLine span:last-child{text-align:right;color:#3c4650}
  .seedTrack{position:relative;height:8px;background:#eef1f3}
  .seedTrack .seedRange{position:absolute;top:1px;bottom:1px;background:#c8d3da}
  .seedTrack .seedMean{position:absolute;top:-1px;bottom:-1px;width:2px;background:#ff000f}

  /* ================================================================
     0721 回灌 · 决策解剖(变体B 实现)并入放大层 #s3MapOverlay 的 #scoreAnatomy;
     评分瀑布 raw→f/t/w_norm→weighted→score_total + Top-3 候选对比表(含 tie_size)。
     ================================================================ */
  #scoreAnatomy{margin-top:12px;border-top:1px dashed #c9ced3;padding-top:10px}
  .waterfallRow{margin-top:7px}
  .waterfallRow .wHead{display:flex;justify-content:space-between;font:8.5px/1.2 Consolas,monospace;color:#4c5963}
  .waterfallRow .wHead b{color:#17202b;font:700 9px/1.2 "Microsoft YaHei",sans-serif}
  .waterfallTrack{height:9px;margin-top:3px;background:#e7ebed;overflow:hidden;position:relative}
  .waterfallTrack i{display:block;height:100%;background:#17365d}
  .waterfallRow[data-zero="true"] .waterfallTrack i{background:#c2c8cc;width:2px!important}
  .normGauges{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed #d8dde1}
  .normGauges div{text-align:center}
  .normGauges b{display:block;font:800 12px/1.2 Consolas,monospace;color:#17365d}
  .normGauges span{font:7.5px/1.2 "Microsoft YaHei",sans-serif;color:#8a939c}
  .scoreTotalLine{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;padding-top:7px;border-top:1px solid #d8dde1}
  .scoreTotalLine b{font:800 15px/1 Consolas,monospace;color:#ff000f}
  table.top3Table{width:100%;border-collapse:collapse;font:9px/1.3 Consolas,monospace}
  table.top3Table th,table.top3Table td{padding:4px 5px;border-bottom:1px solid #e7ebed;text-align:right}
  table.top3Table th:first-child,table.top3Table td:first-child{text-align:left}
  table.top3Table thead th{color:#69717a;font:700 8px/1.2 Consolas,monospace;border-bottom:2px solid #c9d0d5}
  table.top3Table tr.selectedRow{background:#fff7cc}
  table.top3Table tr.selectedRow td:first-child{font-weight:800;box-shadow:inset 3px 0 #e0b600}

  /* ================================================================
     0721 回灌 · 证据抽屉(变体C 内容 · validator.checks 18 项 + checkpoints 哈希链 6 节点 +
     终态账本 + 口径与边界卡)——升级既有小浮层 #evidencePop 为右侧抽屉;沿用 .s3aPop 的
     show/hide 与 Escape 机制,仅覆盖定位/尺寸为固定右栏抽屉,不再靠 placePop() 跟随触发点。
     ================================================================ */
  /* 0722e 用户打回「打开无法关闭 + 与 02 形式不一」:右侧抽屉 → 02 同款证据中心模态
     (全屏遮罩 + 居中卡 + × 钮 + 点遮罩关 + Esc 关);evidencePop 挂 body(避 workHud 层叠
     上下文困住,同 02:2202 教训);.show 显隐沿用(Esc/hidePops 自动兼容)。内容 class
     (drawerSection/checksGrid/timelineNode/ledgerGrid…)不改,样式继续生效,只换外层容器。 */
  #evidencePop.evidenceModal{position:fixed;z-index:200;inset:0;display:none;width:auto;max-width:none;
    align-items:center;justify-content:center;background:#17202b73;padding:0;border:0;box-shadow:none;transform:none}
  #evidencePop.evidenceModal.show{display:flex}
  #evidencePop.evidenceModal .evPanel{width:min(760px,92vw);max-height:86vh;overflow-y:auto;background:#fff;
    border-top:4px solid var(--abb-red);box-shadow:0 18px 50px #17202b4d}
  #evidencePop.evidenceModal .evHead{position:sticky;top:0;z-index:2;display:flex;align-items:center;
    justify-content:space-between;gap:10px;padding:13px 16px;background:#fff;border-bottom:1px solid #dfe4e7}
  #evidencePop.evidenceModal .evHead h4{margin:0;font:800 16px/1.25 "Microsoft YaHei",sans-serif;color:#16191d}
  #evidencePop.evidenceModal .evClose{flex:none;width:30px;height:30px;border:1px solid #18232c;background:#fff;
    font:400 19px/1 Consolas,monospace;color:#18232c;cursor:pointer}
  #evidencePop.evidenceModal .evClose:hover{background:#18232c;color:#fff}
  #evidencePop.evidenceModal .evBody{padding:14px 16px}
  .drawerSection{margin:0 0 14px;padding-bottom:12px;border-bottom:1px dashed #d8dde1}
  .drawerSection:last-of-type{border-bottom:0}
  .drawerSection>b{display:block;font:800 11px/1.2 "Microsoft YaHei",sans-serif;color:#17202b}
  .drawerMeta{display:block;margin-top:2px;font:8px/1.3 Consolas,monospace;color:#69717a}
  .checksGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px 10px;margin-top:7px}
  .checkItem{display:flex;align-items:center;gap:6px;padding:4px 2px;border-bottom:1px solid #f0f2f4;font:9px/1.2 Consolas,monospace;color:#26343e}
  .checkItem .ok{flex:none;width:13px;height:13px;border-radius:50%;background:#1d6b2e;color:#fff;font:800 9px/13px monospace;text-align:center}
  .auditTimelineList{position:relative;padding-left:14px;margin-top:7px}
  .auditTimelineList:before{content:"";position:absolute;left:4px;top:4px;bottom:4px;width:1px;background:#c9d0d5}
  .timelineNode{position:relative;padding:7px 0 7px 12px;border-bottom:1px solid #f0f2f4}
  .timelineNode:last-child{border-bottom:0}
  .timelineNode:before{content:"";position:absolute;left:-14px;top:11px;width:9px;height:9px;border-radius:50%;background:#17365d;border:2px solid #fff;box-shadow:0 0 0 1px #c9d0d5}
  .timelineNode .tHead{display:flex;justify-content:space-between;font:800 9.5px/1.2 Consolas,monospace;color:#17202b}
  .timelineNode .tMeta{margin-top:3px;font:8px/1.4 Consolas,monospace;color:#69717a;word-break:break-all}
  .timelineNode .tMeta b{color:#3c4650}
  .ledgerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#dfe4e7;border:1px solid #dfe4e7;margin-top:7px}
  .ledgerCell{background:#fff;padding:8px 6px;text-align:center}
  .ledgerCell b{display:block;font:800 13px/1.2 Consolas,monospace;color:#17202b}
  .ledgerCell span{display:block;margin-top:4px;font:7.5px/1.2 "Microsoft YaHei",sans-serif;color:#69717a}
  .boundaryQuote{font:italic 9.5px/1.55 "Microsoft YaHei",sans-serif;color:#3c4650;padding:8px 10px;background:#f4f6f7;border-left:3px solid #17365d;margin:7px 0 8px}

  /* ================================================================
     0722 一屏返工(规格 docs/施工规格_一屏返工0722.md §A 一屏纪律 + §B 01 页)。
     根治三问题:①#workHud overflow-y:auto(1196 行,0721 遗留)是竖向滚动主因——赛段比分条/
     终态总分牌/评分解剖/决策依据/批次KPI/七步条全部由 interactions.js 永久搬入放大层
     #s3MapOverlay,常驻区只留 3D + 本节新定义的「赛马精华条」四件;②进页自动播放+顶栏
     暂停/继续双态钮(runtime.js/interactions.js 联动,html 只加 #playPauseBtn 一个按钮);
     ③3D 全景自适应(镜头拉距函数已在上方 inline script 内实现,此处只需把 3D 让出的宽度
     还给它——rail-w 从 0721 的 60% 收窄回 ~300px)。
     #progressAxisHost 的 DOM 父级已由 interactions.js 改为 #viewport 直接子级(不再是
     #workHud 内的 flex 子项),此处用同选择器同 !important 力度把 0721 误设的
     order:2!important;position:static!important 复位回顶部通栏细条。
     ================================================================ */
  /* 0722b:rail 由 clamp(266,17vw,332) 加宽——用户打回「精华条下半 500px+ 空白」:
     窄栏装不下有质量的内容;加宽后三联竖排大图+双指标微条撑满全高(gl 仍 ≥74% 视口宽)。 */
  html[data-s3-layout="A"]{--rail-w:clamp(300px,19vw,400px)}

  html[data-s3-layout="A"] #progressAxisHost{position:absolute!important;z-index:8;
    top:var(--topbar-h);left:var(--rail-w);right:0;height:var(--axis-h);width:auto}
  /* 962 行"进度轴已迁入右栏,不再占独立横条高度"是本次要撤销的 0721 决定本身——轴条现恢复
     独立通栏,#gl 必须让出 axis-h 高度,否则轴条(z-index:8)会盖住 3D 画布顶部一条,
     变成另一种"截顶"。 */
  html[data-s3-layout="A"] #gl{left:var(--rail-w);top:calc(var(--topbar-h) + var(--axis-h))}

  /* -- 精华条本体:#workHud 收窄为单条常驻,零滚动。历史 order/flex-basis 声明对已撤出的
     decisionWrap/traceStats/phaseRail/raceGridsIntro/raceScoreboard/raceFinalBoard/
     raceSeedBand 不再生效(DOM 已不在本容器内,搬运见 interactions.js);仍常驻的四件
     依次为 raceBanner(口径头)/slotMapWrap(三联缩略图)/raceMicroBar(当前节点三算法
     微条,runtime.js 新增)/raceLeadBadge(SCORE-SEQ 领先徽章,runtime.js 新增)。 -- */
  /* 0722d 双向取中(左半):左栏摊开一档——gap 7→11、padding 放宽,呼吸感向全局靠拢 */
  html[data-s3-layout="A"] #workHud{overflow:hidden!important;display:flex!important;
    flex-direction:column!important;gap:11px!important;padding:12px 13px 11px!important;
    justify-content:flex-start!important}
  /* #insightStack 原装 railFacts(早已 display:none 的死块)+ traceStats(本轮已搬入放大层);
     两个子级搬空后它是个空壳,但自身仍带一份 Task10 时代的 grid-template-rows 多轨定义,
     在本节新引入的 1280 断点(#workHud 改 display:grid)下会被自动布局占出一整块空轨道
     ——实测吃掉 213px 高。empty 壳没有 QA 依赖,直接隐藏。 */
  html[data-s3-layout="A"] #workHud #insightStack{display:none!important}
  #raceBanner{order:1!important}
  /* 0721 遗留 html[data-s3-layout="A"] #slotMapWrap{flex:0 0 460px!important} 比选择器
     specificity 更高(多一层 [data-s3-layout] 属性选择器),同 !important 下光靠源码序赢不了它
     ——这里必须同规格选择器才能覆盖,单独 order 之类无冲突属性可以留裸选择器。 */
  /* 0722b:flex 0 0 auto→1 1 auto,三联缩略吃掉 rail 全部富余高度(与 drawSlotMap 竖排分支联动:
     容器高>宽×1.15 时 canvas 自动纵向排三张大网格) */
  html[data-s3-layout="A"] #slotMapWrap{order:2!important;flex:1 1 auto!important;min-height:0!important;
    display:flex!important;flex-direction:column!important}
  #raceMicroBar{order:3!important}
  #raceLeadBadge{order:4!important}

  /* -- 口径声明压缩为头部一行小字,hover/focus 展开全文(独立实现,不复用 .metricHelp
     类名以免误改其既有断言);raceBanner.textContent 仍含全部原文,QA 逐字断言不受影响。 -- */
  #raceBanner.vPanel{position:relative;cursor:help;padding:7px 9px;margin:0}
  #raceBanner .raceBannerLine{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #raceBanner .raceBannerFull{display:none}
  #raceBanner:hover .raceBannerLine,#raceBanner:focus-within .raceBannerLine{visibility:hidden}
  #raceBanner:hover .raceBannerFull,#raceBanner:focus-within .raceBannerFull{
    display:block;position:absolute;left:0;right:0;top:0;z-index:24;padding:8px 10px;
    background:#fff7f5;border:1px solid #f0b8ae;box-shadow:0 8px 20px #17202b26;white-space:normal}

  /* -- 三联缩略图:小、可点(既有 mapWrap 点击开 s3MapOverlay 机制不变,见 interactions.js);
     弹大层内部恢复原尺寸与图例/规则说明。 -- */
  html[data-s3-layout="A"] #workHud #slotMapWrap{padding:7px 8px 6px;cursor:zoom-in}
  html[data-s3-layout="A"] #workHud #slotMapWrap .mapHead b{font-size:9.5px}
  html[data-s3-layout="A"] #workHud #slotMapWrap .mapHead span{font-size:7px}
  html[data-s3-layout="A"] #workHud #slotMapWrap .mapHead strong{font-size:13px}
  html[data-s3-layout="A"] #workHud #slotMapWrap .mapRule{display:none}
  /* 0722b:去 aspect-ratio 锁定,slotMap 撑满 wrap 剩余高(flex:1),竖排由 canvas 侧自适应。
     604 行裸 #slotMap 带 !important(flex:none/height:auto/aspect-ratio 2.55)——必须同挂
     !important 才能赢(!important 冲突比 specificity,本选择器 1 属性+2 id 更高)。 */
  html[data-s3-layout="A"] #workHud #slotMap{min-height:0!important;flex:1 1 auto!important;
    height:auto!important;aspect-ratio:auto!important;margin-top:4px}
  /* 1004 行 html[data-s3-layout="A"] #slotMapWrap .mapKey{display:flex!important} 是历史遗留
     的 !important——非 !important declaration 无论 specificity 多高都赢不了 !important,
     这里必须同挂 !important 才能覆盖(specificity 上 #workHud #slotMapWrap 两个 id 已更高,
     只是之前漏了 !important 这一步)。diffMapWrap 同理:607 行 html[data-s3-layout="A"]
     #workHud #diffMapWrap{display:grid} 是"差异热力图曾常驻左栏"的历史设计,现全部收入
     放大层,rail 内必须强制隐藏。 */
  /* 0722b:图例恢复显示(rail 加宽撑满后空间富余;0722a 藏图例是窄栏时代的妥协) */
  html[data-s3-layout="A"] #workHud #slotMapWrap .mapKey{display:flex!important;flex:none}
  html[data-s3-layout="A"] #workHud #diffMapWrap{display:none!important}
  html[data-s3-layout="A"] #s3MapOverlay #slotMapWrap{cursor:default}

  /* -- 当前容量节点三算法关键指标微条(runtime.js renderRaceMicro 写入) -- */
  #raceMicroBar{border:1px solid var(--rail-line,#cbd2d8);background:var(--card,#fff);padding:6px 8px;margin:0}
  #raceMicroBar .microGroup+.microGroup{margin-top:7px;padding-top:6px;border-top:1px dashed #dbe1e6}
  #raceMicroBar .microHead{display:flex;justify-content:space-between;gap:6px;font:700 8.5px/1.2 Consolas,monospace;color:#69717a;margin-bottom:4px}
  #raceMicroBar .raceBarRow{margin-top:2px}

  /* -- SCORE 相对 SEQ 领先徽章(runtime.js configureDom 一次性写入,终态数据不随播放变化) -- */
  #raceLeadBadge{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 9px;margin:0;
    border:1px solid var(--rail-line,#cbd2d8);background:#fff7f5;border-left:3px solid #ff000f}
  #raceLeadBadge .leadLabel{font:700 8.5px/1.25 "Microsoft YaHei",sans-serif;color:#5c1010}
  #raceLeadBadge .leadValue{font:800 13px/1 Consolas,monospace;white-space:nowrap}
  #raceLeadBadge .leadValue.better{color:#1d6b2e}
  #raceLeadBadge .leadValue.worse{color:#b71c1c}

  /* -- 暂停/继续双态钮(顶栏,单钮双态,aria-pressed;文案由 runtime.js togglePause() 同步) -- */
  html[data-s3-layout="A"] #topbarA #playPauseBtn{order:-1;min-width:52px;height:27px}
  #playPauseBtn[aria-pressed="true"]{background:#17365d;color:#fff;border-color:#17365d}

  /* -- 弹大层扩容(§A.3 max 90vw/90vh):容纳赛段比分条/终态总分牌/30-seed 分布带/评分解剖/
     决策依据/批次KPI/七步条,内部可滚(白名单),遮罩+居中不变,Esc/点遮罩关闭不变。 -- */
  html[data-s3-layout="A"] #s3MapOverlay .mapDock{width:min(94vw,980px);max-width:90vw;max-height:90vh;overflow-y:auto}
  html[data-s3-layout="A"] #s3MapOverlay #raceGridsIntro,
  html[data-s3-layout="A"] #s3MapOverlay #raceScoreboard,
  html[data-s3-layout="A"] #s3MapOverlay #raceFinalBoard,
  html[data-s3-layout="A"] #s3MapOverlay #raceSeedBand,
  html[data-s3-layout="A"] #s3MapOverlay #decisionWrap,
  html[data-s3-layout="A"] #s3MapOverlay #traceStats{
    order:initial!important;position:static!important;width:auto!important;flex:none!important;
    min-height:0!important;height:auto!important;overflow:visible!important;
    border:1px solid var(--rail-line,#cbd2d8);background:#fff;margin:8px 0;padding:9px 11px}
  html[data-s3-layout="A"] #s3MapOverlay #traceStats .statsGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
  html[data-s3-layout="A"] #s3MapOverlay #phaseRail{position:static!important;width:auto!important;
    margin:8px 0;padding:9px 11px;border:1px solid var(--rail-line,#cbd2d8);background:#fff}
  html[data-s3-layout="A"] #s3MapOverlay #phaseSegments{grid-template-columns:repeat(7,1fr)!important;height:26px}
  html[data-s3-layout="A"] #s3MapOverlay .vHead{margin-top:0}

  /* -- 3D 主角让位:精华条已收窄至约 300px,1920 宽下 3D ≥84%,1280 宽下 ≥75%,
     均高于 §B.1/§B.5 的 ≥65%/≥55% 门槛;sceneDock 四列宽度按新的宽裕 3D 区回调。 -- */
  /* 0722d:五列(赛段走势回迁列);此为 A 布局现行生效层(probe 实测),裸 #sceneDock 定义改了无效 */
  html[data-s3-layout="A"] #sceneDock{grid-template-columns:minmax(300px,1.35fr) minmax(210px,.95fr) minmax(165px,.85fr) minmax(150px,.72fr) minmax(165px,.85fr)}

  /* -- 3D 画布显式铺满容器,防 devicePixelRatio 与 CSS 尺寸不同步导致的渲染缺口
     (renderer.setSize 第三参传 false 跳过 style 赋值,历史上无此兜底规则)。 -- */
  #gl>canvas{display:block!important;width:100%!important;height:100%!important}

  /* -- 1280×800 收纳(§B.5):精华条降单行、顶栏元素合并,3D 不小于 55% 宽,零滚动。
     改用 CSS grid 显式列宽,不用 flex 百分比分配——实测 flex:1 1 0 配合 slotMap 的
     aspect-ratio 子项在窄行内会互相反馈震荡(算出的 flex-basis far below 意图值),
     grid 显式轨道尺寸更可控、可预测。 -- */
  @media(max-width:1350px){
    /* 显式 grid-column/grid-row 逐一指定,不吃 order/auto-placement——两列方块(缩略图/微条)
       占满两行高度,右侧 1fr 列内口径头与徽章各占半行上下堆叠,整条只有两行文字高,
       彻底绕开 flex-basis 与 aspect-ratio 子项的反馈震荡问题(实测曾把整条撑到 694px 高)。 */
    /* 672 行 html[data-s3-mode="fill-only-candidate"] #workHud{grid-template-areas:"head head"...
       "phase insight"}(6 行模板区域)选择器优先级与本规则相同(都是 1 attr+1 id),源码序也
       赢不过面积模板——grid-template-areas 隐含的行数会与 grid-template-rows 叠加,凑出 6 行
       而非 2 行(此为实测根因)。这里必须显式清空 grid-template-areas 才能让 auto auto 真正
       只有两行。 */
    /* auto auto 仍会被 stretch 子项的循环尺寸依赖撑到 360px+/行(实测)——改显式定高
       两行,彻底绕开 auto 轨道尺寸算法在"跨行 stretch 子项"下的不收敛问题。 */
    html[data-s3-layout="A"] #workHud{display:grid!important;grid-template-areas:none!important;
      grid-template-columns:78px 78px 1fr;grid-template-rows:44px 44px!important;
      align-items:start;gap:4px 6px!important;padding:20px 8px 6px}
    /* 收纳钮(#railCollapseBtn)基础态是 flex 子项(order:-2),display:grid 下若不给显式坐标
       会被自动布局塞进隐式新轨道、拖高整条——改绝对定位钉在精华条右上角,退出 grid 流。 */
    html[data-s3-layout="A"] #workHud #railCollapseBtn{position:absolute!important;top:2px;right:4px;
      height:16px!important;padding:0 4px!important;font-size:7px;z-index:5}
    html[data-s3-layout="A"] #workHud #railCollapseBtn .edgeLabel{display:none}
    html[data-s3-layout="A"] #workHud #slotMapWrap{grid-column:1;grid-row:1/3;min-width:0;min-height:0;padding:3px 4px}
    html[data-s3-layout="A"] #workHud #raceMicroBar{grid-column:2;grid-row:1/3;min-width:0;display:flex;flex-direction:column}
    html[data-s3-layout="A"] #workHud #raceBanner{grid-column:3;grid-row:1;min-width:0;min-height:0;padding:4px 6px}
    /* flex-wrap:wrap(基础规则,两项并排放不下时各占一行)在窄列下让 justify-content:
       space-between 把两条"各自的行"再拉开一大截空当——这里强制改列向堆叠,彻底不依赖
       wrap 的多行分布算法。 */
    html[data-s3-layout="A"] #workHud #raceLeadBadge{grid-column:3;grid-row:2;min-width:0;min-height:0;
      display:flex!important;flex-direction:column!important;flex-wrap:nowrap!important;
      justify-content:center;align-items:flex-start;gap:1px}
    #raceBanner .raceBannerLine{font-size:8px}
    #raceBanner .raceBannerFull{width:240px;left:auto;right:0}
    #raceLeadBadge .leadLabel{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    html[data-s3-layout="A"] #workHud #slotMapWrap .mapHead{display:none}
    html[data-s3-layout="A"] #workHud #slotMap{aspect-ratio:1/1!important;width:100%;height:auto;min-height:0!important;margin-top:0}
    html[data-s3-layout="A"] #topbarA{gap:8px;padding:0 10px}
    html[data-s3-layout="A"] #topbarA #runtimeControls{gap:6px}
    html[data-s3-layout="A"] #topbarA #runtimeControls label{font-size:7.5px}
    html[data-s3-layout="A"] #topbarA #runtimeControls select{min-width:76px;font-size:8.5px}
    html[data-s3-layout="A"] #topbarA #railHead h1,html[data-s3-layout="A"] #topbarA #railHead .eyebrow{display:none}
    #raceMicroBar .microHead span{display:none}
    #raceLeadBadge .leadLabel{font-size:7px}
    #raceLeadBadge .leadValue{font-size:11px}
  }
</style>

<script>
const STYLE='A';
const VISUAL={
  /* 仍沿 tools/anim3d_formal.py 的右前上方位；只按当前可见实体校准，不用潜在队列包络虚增主体占比。 */
  A:{name:'AS/RS 单机作业台',sub:'同源 SIM 作业',bg:0xe7ecef,pos:[30.0,-40.0,22.5],look:[9.35,-1.25,9.20],fov:32.4,key:0xffffff,rim:0xdde9f3}
}[STYLE];
document.documentElement.dataset.style='A';
document.title='智储优控 · 连续入库 · S3';
document.documentElement.dataset.s3Mode='fill-only-candidate';

/* 信息架构：把同源动态数据移回左侧；三维画面始终留在右侧，不再切页。 */
const rail=document.getElementById('workHud'),viewportEl=document.getElementById('viewport');
const railHead=document.createElement('div');railHead.id='railHead';railHead.innerHTML=`<div class="brandLock"><span class="abbWord">ABB</span><div><div class="eyebrow">${VISUAL.sub}</div><h1>${VISUAL.name}</h1></div></div><div class="matrix">20 × 20<br>SIM / T3</div>`;rail.prepend(railHead);
const speedCanvas=document.createElement('canvas'),liveChartWrap=document.createElement('section');speedCanvas.id='speed';liveChartWrap.id='liveChartWrap';
liveChartWrap.innerHTML='<div class="cap"><b>双轴速度</b><span>X / Z · m/s</span></div>';liveChartWrap.append(speedCanvas);
const slotMapWrap=document.createElement('section');slotMapWrap.id='slotMapWrap';slotMapWrap.innerHTML='<div class="mapHead"><div><b>20 × 20 货位规则图</b><span>列 → / 层 ↑ · 起始快照 + 周期存取</span></div><strong>133 / 400</strong></div><div class="mapRule"><i class="hatch"></i><span>(列 + 层) mod 3 = 0 → 预占禁用</span></div><canvas id="slotMap"></canvas><div class="mapKey"><span><i class="free"></i>可用空位</span><span><span class="gradeChips"><i class="heavy"></i><i class="mid"></i><i class="light"></i></span>在库：重 / 中 / 轻</span><span><i class="target"></i>当前目标</span><span><i class="moving"></i>随载货物</span></div>';
const railFacts=document.createElement('section');railFacts.id='railFacts';railFacts.innerHTML='<div><b id="factCycle">-- / 100</b><span>混合周期</span></div><div><b id="factQueue">--</b><span>等待队列</span></div><div><b id="factAlarm">--</b><span>活动故障</span></div>';
const traceStats=document.createElement('section');traceStats.id='traceStats';traceStats.setAttribute('aria-label','当前单 seed trace 统计');
const insightStack=document.createElement('section');insightStack.id='insightStack';insightStack.append(railFacts,traceStats);
rail.append(slotMapWrap,insightStack,document.getElementById('phaseRail'),document.getElementById('legend'));
const sceneDock=document.createElement('section');sceneDock.id='sceneDock';sceneDock.setAttribute('aria-label','三维作业证据与画面控制');viewportEl.append(sceneDock);

function axisT(d,vmax,acc){

function axisPos(t,d,vmax,acc){

  if(d>=vmax*vmax/acc){
    const ta=vmax/acc;
    if(t<ta)return .5*acc*t*t;
    if(t<=T-ta)return .5*acc*ta*ta+vmax*(t-ta);
    return d-.5*acc*(T-t)*(T-t);

class PiecewiseLinearCurve extends THREE.Curve{

  getPoint(t,target=new THREE.Vector3()){const f=Math.min(1,Math.max(0,t))*(this.points.length-1),i=Math.min(this.points.length-2,Math.floor(f));
    return target.copy(this.points[i]).lerp(this.points[i+1],f-i);}
}

  if(clean.length===1){const halo=new THREE.Mesh(new THREE.SphereGeometry(.22,10,8),haloMaterial),marker=new THREE.Mesh(new THREE.SphereGeometry(.14,10,8),material);
    halo.position.copy(clean[0]);marker.position.copy(clean[0]);group.add(halo,marker);}
  else{const curve=new PiecewiseLinearCurve(clean),segments=Math.max(12,clean.length-1);

      mesh=new THREE.Mesh(new THREE.TubeGeometry(curve,segments,options.radius??.16,8,false),material);group.add(halo,mesh);
    const arrowCount=Math.max(1,Math.min(3,options.arrowCount??2));
    Array.from({length:arrowCount},(_,index)=>(index+1)/(arrowCount+1)).forEach(fr=>{const p=curve.getPoint(fr),p2=curve.getPoint(Math.min(1,fr+.02)),dir=p2.clone().sub(p);

      arrow.position.copy(p);arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);group.add(arrow);});}

function currentAspect(){
  const r=mount.getBoundingClientRect();
  return (r.width>0&&r.height>0)?r.width/r.height:(camera.aspect||1.6);
}
function fitDistanceForAspect(aspect){
  /* 0722b 紧拟合(用户打回「3D 显小四周大片地板」):球面半径对薄板状包围盒(货架宽高大、
     纵深小)过保守——球半径≈对角线半径,拉距虚远。改逐角投影:相机坐标系(视轴=-DEFAULT_DIR,
     up=camera.up)下每角所需距离 = 角深度 + max(|x|/tanH, |y|/tanV),取 8 角最大,×1.06 呼吸边。 */
  const vFov=THREE.MathUtils.degToRad(camera.fov),safeAspect=Math.max(aspect,.2);
  const tanV=Math.tan(vFov/2),tanH=tanV*safeAspect;
  const toCam=new THREE.Matrix4().lookAt(new THREE.Vector3(0,0,0),DEFAULT_DIR.clone().negate(),camera.up).invert();
  let need=controls.minDistance;
  FRAME_CORNERS.forEach(corner=>{
    const p=corner.clone().sub(FRAME_CENTER).applyMatrix4(toCam);
    const d=(-p.z)+Math.max(Math.abs(p.x)/tanH,Math.abs(p.y)/tanV);
    if(d>need)need=d;
  });
  return THREE.MathUtils.clamp(need*1.06,controls.minDistance,controls.maxDistance);
}
let cameraGuard=false;
function cameraSnapshot(){
  const dx=camera.position.x-controls.target.x,dy=camera.position.y-controls.target.y,planar=Math.max(.0001,Math.hypot(dx,dy));
  return {position:camera.position.toArray(),target:controls.target.toArray(),fov:camera.fov,zoom:camera.zoom,
    azimuth:controls.getAzimuthalAngle(),polar:controls.getPolarAngle(),frontality:-dy/planar,
    azimuthLimit:[controls.minAzimuthAngle,controls.maxAzimuthAngle]};
}
function constrainCamera(){
  if(cameraGuard)return;cameraGuard=true;
  controls.target.x=THREE.MathUtils.clamp(controls.target.x,...CAMERA_LIMITS.x);
  controls.target.y=THREE.MathUtils.clamp(controls.target.y,...CAMERA_LIMITS.y);
  controls.target.z=THREE.MathUtils.clamp(controls.target.z,...CAMERA_LIMITS.z);
  camera.position.z=Math.max(camera.position.z,Z0+.8);
  headlight.position.copy(camera.position);headlight.target.position.copy(controls.target);headlight.target.updateMatrixWorld();cameraGuard=false;
}
function setCamera(){
  /* OrbitControls 的阻尼会保留上一帧旋转/平移增量；复位前以无阻尼 update 清空残量，
     否则按钮写入预设后，下一 RAF 仍会把镜头从预设位置继续推走。
     0722:距离不再取 VISUAL.pos 的固定长度,改为沿 DEFAULT_DIR 按当前容器宽高比重新拉距
     (fitDistanceForAspect),角度仍是 VISUAL.pos 校准的默认视角——容器再窄再宽都保证
     FRAME_BOUNDS(货架全高+入库口)入镜,不截顶。 */
  const damping=controls.enableDamping;controls.enableDamping=false;controls.update();
  camera.aspect=currentAspect();
  const distance=fitDistanceForAspect(camera.aspect);
  camera.position.copy(FRAME_CENTER).addScaledVector(DEFAULT_DIR,distance);controls.target.copy(FRAME_CENTER);camera.fov=VISUAL.fov;camera.zoom=1;
  camera.updateProjectionMatrix();camera.lookAt(FRAME_CENTER);controls.update();controls.enableDamping=damping;
  constrainCamera();return cameraSnapshot();}
controls.addEventListener('change',constrainCamera);
setCamera();controls.enabled=true;controls.saveState();

function resizeScene(){
  const r=mount.getBoundingClientRect();
  if(r.width>0&&r.height>0){
    renderer.setSize(r.width,r.height,false);
    camera.aspect=r.width/r.height;
    /* 0722:折叠/窗口变化后必须重算镜头——保留用户当前 orbit 方向(不打断手动取景),
       只按新宽高比重算拉距,确保 FRAME_BOUNDS 任何容器尺寸下都不截顶。 */
    const dir=new THREE.Vector3().subVectors(camera.position,controls.target);
    if(dir.lengthSq()>1e-6){
      dir.normalize();
      camera.position.copy(controls.target).addScaledVector(dir,fitDistanceForAspect(camera.aspect));
    }
    camera.updateProjectionMatrix();controls.update();constrainCamera();
  }
}
resizeScene();

</script>
<script>
/* 治理 C2(0716 深审获批):URL 参数选择货流情景 store——默认 skew(生产 release 不动),
   ?profile=uniform 加载对照情景;两 store 均出自独立重放 validator 闸门。
   data-s3-scenario-switch 标记向 runtime 声明本页支持情景切换(冻结页无此标记,行为不变)。 */
(function () {
  document.documentElement.dataset.s3ScenarioSwitch = "1";
  var uniform = new URLSearchParams(location.search).get("profile") === "uniform";
  document.write('<script src="./s3_fill_store' + (uniform ? "_uniform" : "") + '.js"><' + '/script>');
})();
</script>
<script src="./s3_fill_candidate_runtime.js"></script>
