  #axisHud .axis .vel{font:700 8.5px/1 Consolas,monospace;color:#69747d;text-align:right;white-space:nowrap}
  #axisHud .axis span:nth-child(3){color:#17202b;font-size:9px;font-weight:700;text-align:right;font-family:Consolas,monospace}
  /* (0719d 删死代:液晶 canvas 组样式——559 行 display:none 会被此处 display:grid 反杀,故整段清除) */
  #reserveRuleBadge{grid-area:legend;position:static;margin-top:1px;padding:3px 0 0;border-top:1px solid #eef1f4;display:flex;align-items:center;justify-content:flex-start;gap:8px;
    background:transparent;color:#53616b;pointer-events:none;font:700 7px/1 "Microsoft YaHei",sans-serif}
  #reserveRuleBadge span{min-width:0;display:flex;align-items:center;gap:4px;white-space:nowrap}
  #reserveRuleBadge i{display:block;width:14px;height:4px;flex:none;background:#17365d}
  #reserveRuleBadge .empty i{background:#7d8790}#reserveRuleBadge .out i{background:#4a88a8}
  #reserveRuleBadge .blocked i{height:9px;background:repeating-linear-gradient(135deg,#65727d 0 3px,#c7d0d6 3px 6px)}
  #sceneTools{position:static;width:auto;padding:6px 8px;display:grid;grid-template-rows:auto 1fr auto;background:#fff;color:#26343e;pointer-events:auto}
  #sceneTools .toolHead{font:700 9px/1.15 "Microsoft YaHei",sans-serif}#sceneTools .toolHead span{display:block;color:#68747d;font-size:7px;font-weight:500}
  #sceneTools .toolRow{grid-template-columns:auto minmax(66px,1fr) 38px;gap:7px;margin-top:3px}
  #sceneTools button{height:26px;padding:0 8px;font-size:9px}#sceneTools input[type="range"]{min-height:24px}#playbackValue{font-size:9px}
  #sceneTools .scaleEnds{display:none}#sceneTools .toolNote{display:block;margin:1px 0 0;color:#65717a;font-size:7px;line-height:1.05;white-space:nowrap}
  @media(max-width:1380px){
    #sceneDock{left:calc(var(--rail-w) + 10px);right:10px;grid-template-columns:minmax(240px,1.32fr) minmax(205px,1fr) minmax(170px,.8fr)}
    #sceneCaption{padding:7px 9px}#sceneCaption #sceneActionText{font-size:10px}#sceneTelemetry{padding:6px 7px;gap:7px}
    #sceneTools{padding:6px 7px}#sceneTools .toolRow{gap:5px}#sceneTools button{padding:0 6px}
  }
  @media(max-width:1180px){#sceneDock{grid-template-columns:minmax(220px,1.2fr) minmax(190px,1fr) minmax(160px,.8fr)}
    #reserveRuleBadge{gap:4px}#reserveRuleBadge i{width:11px}#reserveRuleBadge span{font-size:6.5px}}
  @media(max-height:780px){#viewport{--scene-dock-h:70px;--scene-dock-bottom:8px}#sceneCaption{padding-top:4px;padding-bottom:4px}#speed{height:36px}}

  /* 0715 Task17：方形货位图不再被拉成长卡；释放出的高度用于真实 SIM 时长标尺。 */
  /* P2b:Task17 grid 三行死——rail 已被 A 壳 flex 化(中和器对手) */
  #slotMapWrap{align-self:start;container-type:inline-size}
  /* P2a-gen3:#slotMap 旧 !important 组已删(A 壳 704 反制群全键压制)——P3 可试摘 704 对应 !important */
  #insightStack{grid-area:insight;grid-row:5/7}
  #phaseRail{grid-area:phase;align-self:stretch;min-height:72px;padding:7px 8px;display:grid;
    grid-template-rows:auto 10px minmax(34px,1fr);gap:5px;overflow:hidden}
  #phaseRail .phaseTitle{margin:0;align-items:center;font-size:9px;line-height:1.15}
  #phaseClock{font-size:8px;text-align:right;white-space:nowrap}
  #phaseTimeScale{position:relative;display:flex;width:100%;height:10px;background:#e1e6e9;overflow:visible}
  .phaseTimePart{display:block;height:100%;min-width:0;border-right:1px solid #fff;box-sizing:border-box}
  .phaseTimePart.presentationOnly{width:0!important;border-right:0;border-left:2px dashed #68747d}
  .phaseTimePart.active{filter:brightness(.76);box-shadow:inset 0 0 0 1px #17202b}
  .phaseTone1,.phaseTone3{background:#e7b800}.phaseTone2,.phaseTone6{background:#17365d}.phaseTone4{background:#8c969e}
  .phaseTone5{background:#7a4aa8}.phaseTone7{background:#0084a8}
  #phaseTimeCursor{position:absolute;z-index:2;top:-2px;bottom:-2px;width:3px;background:#ff000f;box-shadow:0 0 0 1px #fff;transform:translateX(-1px)}
  #phaseSegments{position:static;display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;height:auto;min-height:42px} /* P3:对手全删,important 摘除;0719 去重复批均行加高 */
  .phaseSeg{min-width:0;padding:4px 2px;display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;gap:1px 3px;
    align-content:center;justify-content:center;background:#edf1f3;color:#4c5963;font:800 9px/1 Consolas,monospace;text-align:center}
  .phaseSeg .phaseName{display:block;overflow:hidden;color:#26343e;font:700 8px/1.1 "Microsoft YaHei",sans-serif;white-space:nowrap;text-overflow:ellipsis}
  .phaseSeg .phaseDuration{grid-column:1/3;display:block;color:#66727b;font:700 8px/1 Consolas,monospace;white-space:nowrap}
  /* 0719 去重复:第三行批均参照(灰、次要)——本周期值 vs 批均同格对照,交织腿数字归一位 */
  .phaseSeg .phaseAvg{grid-column:1/3;display:block;color:#98a2aa;font:700 6.5px/1 Consolas,monospace;white-space:nowrap}
  .phaseSeg.active .phaseAvg{color:#b9c6d0}
  .phaseSeg.active{background:#17202b;color:#fff;box-shadow:inset 0 0 0 2px #ff6a00} /* P3:双类 specificity 本就胜 phaseTone 单类,important 冗余摘 */
  .phaseSeg.active .phaseName,.phaseSeg.active .phaseDuration{color:#fff}
  #phaseCursor{display:none!important}
  @media(max-width:1380px), (max-height:780px){
    #workHud{grid-template-columns:minmax(0,1.22fr) minmax(148px,.78fr);grid-template-rows:auto auto auto auto auto minmax(62px,1fr)}
    #phaseRail{min-height:62px;padding:5px 6px;grid-template-rows:auto 8px minmax(30px,1fr);gap:3px}
    #phaseTimeScale{height:8px}.phaseSeg{padding:3px 1px;font-size:9px}.phaseSeg .phaseName{font-size:8px}.phaseSeg .phaseDuration{font-size:8.5px}
  }
  @media(prefers-reduced-motion:reduce){
    #taskPrimary,#actionBadge,#cycleReset,.tipBubble{transition:none!important}
  }

  /* 0716 恢复门 R02：顶部 taskline 与底部 sceneDock 曾重复显示同一作业。
     保留 taskline DOM 仅供既有 runtime 写入/回归，不再占用可见布局或无障碍树。 */
  /* P2b:R02 隐藏令与 A 壳段重复删(唯一令随 A 壳);grid rows/areas/grid-row 死→flex 化 */
  @media(max-width:1380px), (max-height:780px){
    #workHud{grid-template-rows:auto auto auto auto minmax(62px,1fr)}
  }

  /* ================================================================
     0718 R2 步骤1 · 02 入出闭环页补 A 壳骨架(顶栏 + 入出周期轴 + 左栏 rail)
     作用域 由 s3_mixed_layout_a_interactions.js 设置。
     加法式叠加:与旧 data-style="A" 皮肤同为 html[attr] 特异性、靠后覆盖;
     runtime / 场景脚本零改动,仅 CSS 重塑 + DOM 搬运。变量对齐 01_连续填仓。
     步骤1 只求「A 壳能起来、不白屏」;差异标记/取货实测块留步骤2/3。
     ================================================================ */
  html{--rail-w:clamp(296px,23vw,352px);--topbar-h:46px;--axis-h:56px} /* P2b 转正:A 壳令牌=唯一现行值 */

  /* -- 顶栏:railHead + runtimeControls 由交互层搬入 -- */
  #topbarA{position:absolute;z-index:12;top:0;left:0;right:0;height:var(--topbar-h);
    display:flex;align-items:center;gap:14px;padding:0 14px;background:#fff;border-bottom:3px solid var(--abb-red,#ff000f);box-shadow:0 2px 8px #17202b14}
  #topbarA #railHead{border:0;padding:0;min-height:0;display:flex;align-items:center;gap:10px;flex:none}
  #topbarA #railHead .brandLock{gap:9px}
  #topbarA #railHead .abbWord{font-size:20px}
  #topbarA #railHead h1{font-size:15px;white-space:nowrap}
  #topbarA #railHead .eyebrow{font-size:7px}
  #topbarA #railHead .matrix{display:none}
  /* 0719 顶栏革新:控件统一 26px 高、间距节律 10px、组间分隔线;状态徽章(已校验/PLC)去按钮观感 */
  #topbarA #runtimeControls{display:flex;align-items:center;gap:12px;flex:1;min-width:0;border:0;padding:0;background:transparent}
  /* 0719d(绿框):情景配置组容器化——三个 label+select 融为一个灰底单元,select 去独立边框;裸珠子散排消除 */
  #topbarA .scenarioGroup{display:flex;align-items:center;min-width:0;background:#f2f4f6;border:1px solid #dde3e8;padding:2px 6px}
  #topbarA .scenarioGroup label+label{border-left:1px solid #d6dde2;margin-left:9px;padding-left:9px}
  #topbarA #runtimeControls label{display:flex;align-items:center;gap:5px;font-size:8.5px;white-space:nowrap;color:#59656e;font-weight:700}
  #topbarA #runtimeControls select{width:auto;min-width:110px;height:24px;border:0;background:transparent;font-size:9.5px;padding:0 4px;color:#17202b;font-weight:700}
  /* 按钮分组:播放组(暂停/回放)| 证据组(导出/本屏/对照),组间 1px 分隔;「暂停/继续」为主按钮深蓝实底 */
  #topbarA #runtimeActions{margin-left:auto;display:flex;align-items:center;gap:9px;grid-column:auto}
  #topbarA #runtimeActions .btnSet{display:flex;align-items:center;gap:5px}
  #topbarA #runtimeActions .btnSet+.btnSet{border-left:1px solid #d6dde2;padding-left:10px}
  #topbarA #runtimeActions button{height:26px;min-height:26px;border:1px solid #33404a;background:#fff;color:#1d2b34;font-size:9px;padding:0 10px;cursor:pointer}
  #topbarA #runtimeActions button:hover{background:#17365d;color:#fff;border-color:#17365d}
  #topbarA #runtimeActions #pauseMotion{background:#17365d;color:#fff;border-color:#17365d;font-weight:700} /* 3id 压过通用按钮规则 */
  #topbarA #runtimeActions #pauseMotion:hover{background:#0f2440;border-color:#0f2440}
  #topbarA #traceLoadState{padding:5px 9px;background:#eef6ee;color:#1c6b34;font-weight:700;font-size:8.5px;white-space:nowrap}
  #topbarA #traceErrorHost{position:absolute;top:100%;left:0;right:0;z-index:30}

  /* -- 左栏 rail:决策卡 → insight 统计 → 2D 货位图 → 七步条(axisHud/liveChart 在 dock,不占 rail) -- */
  /* P2b:三 none 中和器与 border-top:0/grid-area:auto 反制已删(前代 grid 对手全清) */
  #workHud{inset:var(--topbar-h) auto 0 0;width:var(--rail-w);
    display:flex;flex-direction:column;gap:7px;padding:8px 9px;overflow:hidden;border-right:1px solid #b9c2c9;background:#f6f7f8}
  #taskline{display:none!important}
  #decisionWrap{order:1;flex:none;align-self:stretch}
  #insightStack{order:2;flex:none;display:block}
  /* 0719 R2步骤2 左栏信息架构重排(取代 0718 的可滚动兜底 —— 兜底实测不合格:
     railOverflow[914,850]、canvasBottomVsViewport[917,900],2D 货位图底部越过视口需滚动才看全)。
     依据 ISA-101.01-2015 四级信息分层:S1 受控对照与本屏证据链降级为顶栏 chip「本屏证据」→ 叠层。
     内容零删减,只改可达路径;腾出的高度全部给 2D 货位图。详见 docs/左栏信息架构研究与合流方案_0718.md。 */
  #slotMapWrap{order:3;flex:1 1 auto;min-height:240px;align-self:stretch;width:auto}
  /* 0719 修(三次实测才定位,前两次改动都无效):
     ① CSS 上不该有 aspect-ratio —— 它在列向 flex 里从宽度推高度,使画布无视容器剩余空间。
        1366×720 实测 slotMap 底部 725 > wrap 底部 635,溢出被 overflow:hidden 裁掉,
        mapKey 整行(bottom 742)全没。而 drawSlotMap 本就自带方阵自适应并居中
        (size = Math.min(width-24, height-12),s3_ac_runtime.js:1258),让画布填满 flex 分到的框即可。
     ② 640 行旧规则带 flex:none!important / height:auto!important / aspect-ratio:1/1,
        会压掉本处 A 壳规则(实测计算样式一直是 flex:0 0 auto、aspectRatio:1/1),故须同以 !important 覆盖。
     ③ 上一版这段注释写成了两个 /* 块,第二段变成裸文本把规则一起吞掉——CSS 静默失效,只有读计算样式才发现。 */
  #slotMap{width:100%;height:auto;max-width:100%;aspect-ratio:auto;
    min-height:0;flex:1 1 0;margin:4px 0 0;align-self:stretch} /* P3:对手(旧 !important 组)gen3 已删,4 个 important 全摘 */
  #phaseRail{order:4;flex:none;position:static;width:auto}

  /* -- 入出周期轴:里程碑节点 0/25/50/75/100(几何仿 01 fillBookmarks;语义=入出交替推进) -- */
  #progressAxisHost{position:absolute;z-index:8;top:var(--topbar-h);left:var(--rail-w);right:0;height:var(--axis-h);
    background:#fff;border-bottom:1px solid #b9c3ca;box-shadow:0 2px 8px #17202b0d}
  #cycleAxis{position:relative;height:100%;display:flex;align-items:center;gap:16px;padding:0 16px}
  #cycleAxis .cycleHead{flex:none}
  #cycleAxis .cycleHead b{display:block;font-size:11.5px;white-space:nowrap;color:#16191d}
  #cycleAxis .cycleHead span{display:block;margin-top:2px;font-size:7.5px;white-space:nowrap;color:#65717c}
  #cycleAxisTrack{flex:1 1 auto;position:relative;height:34px;min-width:220px}
  #cycleAxisTrack::before{content:"";position:absolute;left:0;right:0;top:16px;height:3px;background:#d9dde1}
  #cycleAxisTrack .cycleFill{position:absolute;left:0;top:16px;height:3px;background:#17365d;width:var(--cycle-fill,0%);transition:width .2s linear}
  #cycleAxisTrack button{position:absolute;top:7px;width:21px;height:21px;margin-left:-11px;padding:0;
    border:2px solid #17365d;border-radius:50%;background:#fff;color:transparent;font-size:0;line-height:0;cursor:pointer;box-shadow:none}
  #cycleAxisTrack button.axisDone{background:#17365d}
  #cycleAxisTrack button[aria-current="true"]{border-color:#ff000f;background:#ff000f;box-shadow:0 0 0 4px #ff000f2b}
  #cycleAxisTrack button:focus-visible{outline:3px solid var(--amber);outline-offset:3px}
  #cycleAxisTrack button::after{content:attr(data-axis-label);position:absolute;top:24px;left:50%;
    transform:translateX(-50%);color:#75828c;font:8.5px/1 Consolas,monospace;white-space:nowrap}
  #cycleAxisRight{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:1px;color:#5d6a74;font:7.5px/1.2 Consolas,monospace}
  #cycleAxisRight b{font-size:11px;color:#16191d}

  /* -- 3D 区:让位给顶栏 + 周期轴(bottom 仍由 sceneDock 规则承担) -- */
  #gl{left:var(--rail-w);top:calc(var(--topbar-h) + var(--axis-h))}
  #cycleReset{left:var(--rail-w);top:calc(var(--topbar-h) + var(--axis-h))}

  /* -- 共享浮层(节点快照) + 2D 放大层 -- */
  .s3aPop{position:absolute;z-index:80;width:250px;background:#fff;border:1px solid #c9ced3;border-top:3px solid var(--abb-red,#ff000f);
    box-shadow:0 8px 26px #17202b36;padding:10px 12px;font:10px/1.5 "Microsoft YaHei",sans-serif;color:#1c2932;display:none}
  .s3aPop.show{display:block}
  .s3aPop h4{margin:0 0 5px;font-size:11px;line-height:1.3}
  .s3aPop table{width:100%;border-collapse:collapse}
  .s3aPop td{padding:2px 0;font-size:10px}
  .s3aPop td:last-child{text-align:right;font-weight:700;font-family:Consolas,monospace}
  .s3aPop .note{margin-top:5px;color:#8a9096;font-size:8.5px;line-height:1.4}
  #s3MapOverlay{position:absolute;z-index:60;inset:0;display:none;align-items:center;justify-content:center;background:#17202b66}
  #s3MapOverlay.open{display:flex}
  #s3MapOverlay .mapDock{width:min(78vh,720px);max-width:88%;background:#fff;border-top:4px solid var(--abb-red,#ff000f);
    padding:12px 46px 10px 14px;box-shadow:0 18px 50px #0f171e59;position:relative}
  #s3MapOverlay .mapDockClose{position:absolute;right:8px;top:6px;width:26px;height:26px;border:1px solid #18232c;background:#fff;
    color:#18232c;font:500 17px/1 Arial,sans-serif;cursor:pointer}
  #s3MapOverlay #slotMapWrap{flex:none;order:0;min-height:0;cursor:default;border:0;padding:0;overflow:visible;width:auto} /* P3:specificity 本就胜出,important 冗余摘 */
  #s3MapOverlay #slotMap{min-height:0;margin:8px auto 0;max-height:none} /* P3:与 667 同值,important 冗余摘 */

  /* -- 0719 本屏证据叠层:承接从左栏降级下来的「本屏证据链」+「S1 受控对照」(ISA-101 L2-L3 按需层) -- */
  #evidenceDock{position:fixed;z-index:64;inset:0;display:flex;align-items:center;justify-content:center;background:#17202b73}
  #evidenceDock[hidden]{display:none}
  #evidenceDock .evidencePanel{width:min(560px,90vw);max-height:86vh;overflow-y:auto;background:#fff;
    border-top:4px solid var(--abb-red,#ff000f);box-shadow:0 18px 50px #0f171e59;padding:0 16px 16px}
  #evidenceDock header{position:sticky;top:0;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;
    gap:12px;padding:13px 0 10px;background:#fff;border-bottom:1px solid #e2e6ea}
  #evidenceDock header span{display:block;font:700 8.5px/1 Consolas,monospace;letter-spacing:.7px;color:#6d7780}
  #evidenceDock header h2{margin:5px 0 0;font-size:14.5px;line-height:1.25;color:#16191d}
  #evidenceDock #closeEvidenceDock{flex:none;width:26px;height:26px;border:1px solid #18232c;background:#fff;
    color:#18232c;font:500 17px/1 Arial,sans-serif;cursor:pointer}
  #evidenceDock #judgePath,#evidenceDock #comparisonMini{margin-top:12px}
  #openEvidenceDock[aria-haspopup="dialog"]{white-space:nowrap}

  /* ===== 0719 功能批次(甲·地图王):sparkline / 故障红点 / 口径小字 / 复现指纹 / PLC 徽章 / 叠层扩容 ===== */
  /* 暂停贴条:seek/seekFault 后的显眼状态反馈(交互可见性) */
  #pausedHint{position:absolute;z-index:12;top:calc(var(--topbar-h) + var(--axis-h) + 12px);left:50%;transform:translateX(-50%);
    padding:6px 14px;background:#17365df0;color:#fff;font:700 11px/1.3 "Microsoft YaHei",sans-serif;
    box-shadow:0 4px 14px #17202b33;pointer-events:none;white-space:nowrap}
  #pausedHint[hidden]{display:none}
  /* 七步条故障宿主步:红顶边+红时长(时长显示「作业+停机」拆分,见 renderFrame);
     比例条同标红纹——OEE/ISO 22400 口径:停机=独立 Availability loss,不折叠进作业时长 */
  .phaseSeg.faultStep{box-shadow:inset 0 3px 0 #c62828}
  .phaseSeg.faultStep .phaseDuration{color:#c62828;font-weight:800}
  .phaseTimePart.faultPart{background:repeating-linear-gradient(135deg,#c62828 0 4px,#e9b2ad 4px 8px)}
  /* 2D 图例双态(选定①热度纯净):heat 开显 heatKey,关显 gradeKey(runtime drawSlotMap 幂等切换) */
  #slotMapWrap .heatRamp{display:inline-block;width:34px;height:8px;flex:none;
    background:linear-gradient(90deg,#aeb8c0,#e7b800,#c0392b)}
  #slotMapWrap .mapKey [hidden]{display:none}
  #respSpark{margin-top:6px;background:#fff;border:1px solid #cbd2d8;padding:6px 9px 5px}
  #respSpark .sparkHead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
  #respSpark .sparkHead b{font-size:9.5px;color:#16191d}
  #respSpark .sparkHead span{font:7px/1 Consolas,"Microsoft YaHei",monospace;color:#65717c}
  #respSpark canvas{display:block;width:100%;height:26px}
  #cycleAxisTrack .axisFaultDot{position:absolute;top:10px;width:15px;height:15px;margin-left:-7.5px;padding:0;
    border:2px solid #fff;border-radius:50%;background:#c62828;box-shadow:0 0 0 2px #c62828;cursor:pointer}
  #cycleAxisTrack .axisFaultDot:focus-visible{outline:3px solid var(--amber);outline-offset:3px}
  #cycleAxisTrack .axisFaultDot i{position:absolute;top:-13px;left:50%;transform:translateX(-50%);
    font:900 8px/1 Consolas,monospace;color:#c62828;font-style:normal;white-space:nowrap}
  .metricHelp .statCaliber{display:block;margin-top:2px;font:400 6.5px/1.2 "Microsoft YaHei",sans-serif;color:#8a6d00;font-style:normal}
  .statFinger{margin-top:4px;font:7px/1.3 Consolas,monospace;color:#65717c}
  .metricHelp.statJump{cursor:pointer;box-shadow:inset 0 0 0 1px #c6282833}

liveChartWrap.innerHTML='<div class="cap"><b>双轴速度</b><span>X / Z · m/s</span></div>';liveChartWrap.append(speedCanvas);

/* 0718 #26-2 货位热度色阶图例 + 近 I/O 热区说明(替代逐箱金顶)。 */

heatLegend.innerHTML='<div class="hlRow"><b>货位热度</b><span>freq_true</span></div><div class="hlBar"></div><div class="hlScale"><span>低频(冷)</span><span>高频(热)</span></div><div class="hlToggles"><label><input type="checkbox" id="heat3dToggle" checked><span>3D 货位</span></label><label><input type="checkbox" id="heat2dToggle" checked><span>2D 图</span></label></div><div class="hlZone"><i></i><span>热门货聚集区 · 近 I/O（好放置兑现）</span></div>';

sceneTools.innerHTML='<div class="toolHead"><b>镜头与演示倍率</b><span>不改 SIM / KPI</span></div><div class="toolRow"><button id="resetCamera" type="button">总览</button><input id="playbackSpeed" type="range" min="0.25" max="2" step="0.25" value="1" aria-label="演示速度倍率"><output id="playbackValue" for="playbackSpeed">1.00×</output></div><div class="toolNote">0.25× 慢放 · 2.00× 快放</div>';

['targetLeader'].forEach(id=>{const line=document.createElementNS('http://www.w3.org/2000/svg','polyline');line.id=id;line.hidden=true;line.style.display='none';labelLeaders.append(line);});viewportEl.append(labelLeaders);

const faultStateBanner=document.createElement('div');faultStateBanner.id='faultStateBanner';faultStateBanner.hidden=true;faultStateBanner.setAttribute('role','status');faultStateBanner.setAttribute('aria-live','polite');faultStateBanner.innerHTML='<b>SIM 故障恢复</b><span>模型故障 · 设备保持</span>';viewportEl.append(faultStateBanner);

/* 黄金参照常量：tools/anim3d_formal.py:44-60,64-125,194-237,418-428 */
const N=20, Z0=-0.5;
const VX=2.0,VZ=0.5,AX=0.5,AZ=0.3,T_LOAD=4.0,T_DWELL=4.0;
/* canonical 仍只有一个逻辑 I/O=(0,0)。INFEED/OUTFEED 仅把 Factory I/O 的 Entry→Load、Unload→Exit 物理工位可视化；不进入 sim/KPI。 */

});

/* 纵深严格回源 tools/anim3d_formal.py:201-213：单深位 0.95 m，不增加第二存储面。 */

const C={bg:0xe7ecef,floor:0xcbd3d9,seam:0x8f9da7,pad:0xc1cbd1,body:0x526471,
  inner:0x3f4f5b,edge:0xc8d2d8,plinth:0x465761,cap:0x75848f,digit:'#4d5962',

  heavy:0x102a43,mid:0x006bb6,light:0x42c7e6,lid:0x0b1f33,alarm:0xb71c1c,
  amber:0xe7b800,path:0xff6a00,returnPath:0x0084a8,rail:0x64717c,mast:0x123b62,carriage:0x376e9b,
  infeed:0x214e78,outfeed:0x0084a8};

function axisT(d,vmax,acc){
  if(d<=0)return 0;
  return d>=vmax*vmax/acc ? d/vmax+vmax/acc : 2*Math.sqrt(d/acc);
}
function axisPos(t,d,vmax,acc){
  if(d<=0)return 0;
  const T=axisT(d,vmax,acc);t=Math.min(Math.max(t,0),T);
  if(d>=vmax*vmax/acc){
    const ta=vmax/acc;
    if(t<ta)return .5*acc*t*t;
    if(t<=T-ta)return .5*acc*ta*ta+vmax*(t-ta);
    return d-.5*acc*(T-t)*(T-t);
  }
  const ta=Math.sqrt(d/acc);

/* 运行时只根据当前 event 的 from/to 生成轨迹；分段线性 curve 保留物理拐折，不做样条平滑。 */
class PiecewiseLinearCurve extends THREE.Curve{
  constructor(points){super();this.points=points;}
  getPoint(t,target=new THREE.Vector3()){const f=Math.min(1,Math.max(0,t))*(this.points.length-1),i=Math.min(this.points.length-2,Math.floor(f));
    return target.copy(this.points[i]).lerp(this.points[i+1],f-i);}
}
function addPath(points,options={}){const group=new THREE.Group(),material=new THREE.MeshBasicMaterial({
    color:options.color??C.path,transparent:true,opacity:options.opacity??.2,depthWrite:false,depthTest:true}),
    haloMaterial=new THREE.MeshBasicMaterial({color:0xf7fbff,transparent:true,opacity:0,depthWrite:false,depthTest:false});
  const clean=points.filter((point,index)=>index===0||point.distanceTo(points[index-1])>1e-6);
  if(clean.length===1){const halo=new THREE.Mesh(new THREE.SphereGeometry(.22,10,8),haloMaterial),marker=new THREE.Mesh(new THREE.SphereGeometry(.14,10,8),material);
    halo.position.copy(clean[0]);marker.position.copy(clean[0]);group.add(halo,marker);}
  else{const curve=new PiecewiseLinearCurve(clean),segments=Math.max(12,clean.length-1);
    const halo=new THREE.Mesh(new THREE.TubeGeometry(curve,segments,options.haloRadius??.25,8,false),haloMaterial),
      mesh=new THREE.Mesh(new THREE.TubeGeometry(curve,segments,options.radius??.16,8,false),material);group.add(halo,mesh);
    const arrowCount=Math.max(0,Math.min(3,options.arrowCount??2)); /* M5:虚线段允许显式 0 箭头;默认 2 不变 */
    Array.from({length:arrowCount},(_,index)=>(index+1)/(arrowCount+1)).forEach(fr=>{const p=curve.getPoint(fr),p2=curve.getPoint(Math.min(1,fr+.02)),dir=p2.clone().sub(p);
      if(dir.lengthSq()<1e-8)return;dir.normalize();const arrow=new THREE.Mesh(new THREE.ConeGeometry(.15,.36,10),material);
      arrow.position.copy(p);arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);group.add(arrow);});}
  group.userData={operationKey:options.operationKey||null,kind:options.kind||null};scene.add(group);return {group,material,haloMaterial};}

function cameraSnapshot(){
  const dx=camera.position.x-controls.target.x,dy=camera.position.y-controls.target.y,planar=Math.max(.0001,Math.hypot(dx,dy));
  return {position:camera.position.toArray(),target:controls.target.toArray(),fov:camera.fov,zoom:camera.zoom,
    azimuth:controls.getAzimuthalAngle(),polar:controls.getPolarAngle(),frontality:-dy/planar,
    azimuthLimit:[controls.minAzimuthAngle,controls.maxAzimuthAngle]};
}
function constrainCamera(){
  if(cameraGuard)return;cameraGuard=true;

  controls.target.y=THREE.MathUtils.clamp(controls.target.y,...CAMERA_LIMITS.y);

  const damping=controls.enableDamping;controls.enableDamping=false;controls.update();

  camera.updateProjectionMatrix();camera.lookAt(FOCAL);controls.update();controls.enableDamping=damping;
